const W = 420, H = 760;                 // world units (portrait)
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1, offX = 0, offY = 0, dpr = 1;

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr); canvas.height = Math.round(r.height * dpr);
  scale = Math.min(r.width / W, r.height / H);
  offX = (r.width - W * scale) / 2;
  offY = (r.height - H * scale) / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize, 250));
if(window.visualViewport){
  visualViewport.addEventListener('resize', resize);
  visualViewport.addEventListener('scroll', resize);
}
resize();
setTimeout(resize, 350); // iOS settles its viewport late

// clientX/Y and getBoundingClientRect share a coordinate space on every
// browser, so mapping through a fresh rect survives iOS viewport quirks.
function toWorld(cx, cy){
  const r = canvas.getBoundingClientRect();
  const s = Math.min(r.width / W, r.height / H);
  return {
    x: (cx - r.left - (r.width - W * s) / 2) / s,
    y: (cy - r.top  - (r.height - H * s) / 2) / s,
  };
}

  const p = h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const a=p(h1), b=p(h2);
  return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`;

/* ---------------- audio (tiny synth) ---------------- */
let AC = null, muted = localStorage.getItem('bth_muted') === '1';
function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC && AC.state==='suspended') AC.resume(); return AC; }
function tone(freq, dur, type='sine', vol=0.15, slideTo=null, when=0){
  const ac = audio(); if(!ac || muted) return;
  const t0 = ac.currentTime + when;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(slideTo,1), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.05);
}

/* ---------------- path helpers ---------------- */
function catmullRom(ctrl, seg=22){
  const P = [ctrl[0], ...ctrl, ctrl[ctrl.length-1]];
  const out = [];
  const cr = (a,b,c,d,t)=>{ const t2=t*t, t3=t2*t;
    return 0.5*((2*b)+(-a+c)*t+(2*a-5*b+4*c-d)*t2+(-a+3*b-3*c+d)*t3); };
  for(let i=1;i<P.length-2;i++){
    const p0=P[i-1], p1=P[i], p2=P[i+1], p3=P[i+2];
    for(let j=0;j<seg;j++){
      const t=j/seg;
      out.push({
        x: cr(p0.x,p1.x,p2.x,p3.x,t),
        y: cr(p0.y,p1.y,p2.y,p3.y,t),
        z: Math.max(0, cr(p0.z||0,p1.z||0,p2.z||0,p3.z||0,t)),
      });
    }
  }
  out.push({ x:ctrl[ctrl.length-1].x, y:ctrl[ctrl.length-1].y, z:ctrl[ctrl.length-1].z||0 });
  return out;
}
function buildPath(ctrl){
  const pts = catmullRom(ctrl);
  // per-point screen normal (perpendicular, pointing down-screen) for the wall extrusion
  for(let i=0;i<pts.length;i++){
    const a = pts[Math.max(i-1,0)], b = pts[Math.min(i+1,pts.length-1)];
    const tx=b.x-a.x, ty=b.y-a.y, len=Math.hypot(tx,ty)||1;
    let nx=-ty/len, ny=tx/len;
    if(ny<0){ nx=-nx; ny=-ny; }
    pts[i].nx=nx; pts[i].ny=ny;
  }
  const cum = [0];
  for(let i=1;i<pts.length;i++)
    cum.push(cum[i-1] + Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y));
  const length = cum[cum.length-1];
  function at(d){
    d = clamp(d, 0, length);
    let i = 1;
    while(i < cum.length-1 && cum[i] < d) i++;
    const t = (d - cum[i-1]) / Math.max(cum[i]-cum[i-1], 0.0001);
    return {
      x: lerp(pts[i-1].x, pts[i].x, t),
      y: lerp(pts[i-1].y, pts[i].y, t),
      z: lerp(pts[i-1].z, pts[i].z, t),
      dx: (pts[i].x-pts[i-1].x),
    };
  }
  return { pts, length, at, start: pts[0], end: pts[pts.length-1] };
}

/* ---------------- toolbar ---------------- */
function buildToolbar(){
  el.toolbar.innerHTML='';
  for(const key of Object.keys(TOOL_DEFS)){
    if(!(key in toolStock)) continue;
    const t = TOOL_DEFS[key];
    const b = document.createElement('button');
    b.className='tool'; b.dataset.key=key;
    b.innerHTML = `<span class="ico">${t.ico}</span><span class="lbl">${t.lbl}</span><span class="cnt">${toolStock[key]}</span>`;
    b.addEventListener('click', ev=>{ ev.stopPropagation(); selectTool(key); });
    el.toolbar.appendChild(b);
  }
  refreshToolbar();
}
function refreshToolbar(){
  for(const b of el.toolbar.children){
    const k = b.dataset.key;
    b.querySelector('.cnt').textContent = toolStock[k];
    b.classList.toggle('empty', toolStock[k]<=0);
    b.classList.toggle('sel', selectedTool===k);
  }
}
function selectTool(key){
  if(toolStock[key]<=0){ toast("Fresh out. Blame procurement."); return; }
  selectedTool = (selectedTool===key) ? null : key;
  hoverPos = null;
  el.hint.textContent = selectedTool ? `Tap the street to place the ${TOOL_DEFS[key].lbl.toLowerCase()}` : '';
  el.hint.classList.toggle('show', !!selectedTool);
  refreshToolbar();
}

/* ---------------- walkers ---------------- */
function freshName(){
  if(usedNames.length >= NAMES.length) usedNames = [];
  let n; do { n = pick(NAMES); } while(usedNames.includes(n));
  usedNames.push(n); return n;
}
function spawnWalker(){
  const isVip = !!level.mix?.vip && spawned === Math.floor(level.count/2);
  const isJog = !isVip && Math.random() < (level.mix?.jogger || 0);
  const w = {
    d: 0, heat: 0, state:'walk', t:0,
    type: isVip ? 'vip' : isJog ? 'jogger' : 'reg',
    speed: level.speed * (isVip ? 0.72 : isJog ? 1.6 : rand(0.88, 1.14)),
    heatMul: isJog ? 1.4 : 1,
    worth: isVip ? 3 : 1,
    name: isVip ? 'The Regional VP' : freshName(),
    skin: pick(SKIN), hair: pick(HAIR),
    shirt: isVip ? '#F7F3EA' : isJog ? pick(['#FF8FAF','#8FE0C8','#FFD66B','#9AD6F0']) : pick(SHIRT),
    pants: isJog ? '#4A566A' : pick(PANTS),
    tieHue: rand(0,360), phase: rand(0,TAU), fanCd: 0, popT: 0,
    hasBag: isVip ? true : isJog ? false : Math.random()<0.7,
    glasses: isVip ? true : Math.random()<0.3,
  };
  walkers.push(w);
  spawned++;
  if(isVip) toast('👔 The Regional VP has entered the heat. Worth 3!', true);
}

/* ---------------- level flow ---------------- */
function startLevel(idx, endlessN=0){
  levelIndex = idx; endlessDay = endlessN;
  level = endlessN>0 ? endlessLevel(endlessN) : LEVELS[idx];
  path = buildPath(level.ctrl);
  walkers=[]; placed=[]; particles=[]; puddles=[]; usedNames=[]; meltJokes=[];
  rotors = (level.rotors||[]).map(def => {
    const d0 = def.at * path.length, r = def.r;
    const c = path.at(d0);
    let dIn = d0, dOut = d0; // walk outward to where the path crosses the disc edge
    while(dIn > 0 && dist2(path.at(dIn).x, path.at(dIn).y, c.x, c.y) < r*r) dIn -= 4;
    while(dOut < path.length && dist2(path.at(dOut).x, path.at(dOut).y, c.x, c.y) < r*r) dOut += 4;
    const pin = path.at(dIn), pout = path.at(dOut);
    return { x:c.x, y:c.y, z:c.z||0, r, dIn, dOut, wob:0, link:def.link,
      base: Math.atan2(pout.y-pin.y, pout.x-pin.x), angle: 0, target: 0 };
  });
  if(rotors.length){
    // scramble by applying random taps — guarantees the puzzle is solvable
    for(let k=0; k<3+rotors.length*2; k++) tapRotor(Math.floor(Math.random()*rotors.length), true);
    if(rotors.every(r=>rotorAligned(r))) tapRotor(0, true); // never start solved
    rotors.forEach(r => r.angle = r.target);
  }
  scorchZones = (level.scorch||[]).map(f => { const p = path.at(f*path.length); return { x:p.x, y:p.y, z:p.z||0, r:34 }; });
  timeScale = 1;
  toolStock = {...level.tools};
  selectedTool=null; hoverPos=null;
  spawned=0; savedCount=0; meltedCount=0; spawnTimer=0.8; endTimer=-1; playT=0;
  if(endlessN===1) endlessChilled=0; // fresh endless run
  el.hint.classList.remove('show');
  el.lbSubmit.classList.add('hidden');

  el.saved.textContent='0'; el.quota.textContent=level.quota;
  el.melted.textContent='0'; el.tempv.textContent=level.temp;
  buildToolbar();

  el.introKicker.textContent = endlessN>0 ? 'Endless Mode' : `Level ${idx+1} of ${LEVELS.length}`;
  el.introName.textContent = level.name;
  el.introBrief.innerHTML = level.brief;
  el.introTools.textContent = 'Supplies: ' + Object.keys(toolStock).map(k=>`${TOOL_DEFS[k].ico}×${toolStock[k]}`).join('  ');
  el.title.classList.add('hidden');
  el.resultModal.classList.add('hidden');
  el.introModal.classList.remove('hidden');
  el.hud.classList.remove('hidden');
  el.toolbar.classList.remove('hidden');
  el.openBtn.classList.add('hidden');
  el.ffBtn.classList.add('hidden');
  S.mode='intro';
}
function beginPlay(){
  el.introModal.classList.add('hidden');
  S.mode='plan';
  audio();
  el.openBtn.classList.remove('hidden');
  el.ffBtn.classList.add('hidden');
  refreshOpenBtn();
  if(rotors.length) toast('Spin the rotundas until the path connects 🌀', true);
  else toast('Place your gear, then open the doors', true);
}
function rotorAligned(r){
  if(Math.abs(r.target - r.angle) > 0.05) return false; // still turning
  const m = ((r.angle % Math.PI) + Math.PI) % Math.PI;
  return m < 0.1 || m > Math.PI - 0.1;
}
const pathConnected = () => rotors.every(r => rotorAligned(r));
function tapRotor(i, silent=false){
  const r = rotors[i];
  r.target += Math.PI/2;
  if(r.link != null && rotors[r.link]) rotors[r.link].target += Math.PI/2;
  if(!silent) sfx.rotate();
}
function refreshOpenBtn(){
  const ok = pathConnected();
  el.openBtn.disabled = !ok;
  el.openBtn.textContent = ok ? '🚪 OPEN THE DOORS' : '🧩 CONNECT THE PATH';
}
function openDoors(){
  if(!pathConnected() || S.mode!=='plan') return;
  S.mode='playing';
  el.openBtn.classList.add('hidden');
  el.ffBtn.classList.remove('hidden');
  timeScale = 1; el.ffBtn.textContent = '⏩';
  sfx.win();
}
function finishLevel(){
  S.mode='done';
  el.ffBtn.classList.add('hidden');
  const total = level.count;
  const win = savedCount >= level.quota;
  const stars = savedCount>=total ? 3 : (savedCount >= level.quota + Math.ceil((total-level.quota)/2) ? 2 : (win?1:0));
  el.resKicker.textContent = level.endless ? `Infinite Summer · Day ${endlessDay}` : 'Quarterly Melt Report';
  el.resTitle.textContent = win
    ? pick(["Sufficiently Chilled!","The Pool Embraces You","Crisis (Mostly) Averted","Cool Under Pressure"])
    : pick(["Everyone Is Soup","Thermal Non-Compliance","The Puddle Report Is In"]);
  el.resStars.textContent = win ? '⭐'.repeat(stars)+'☆'.repeat(3-stars) : '🫠';
  el.resSaved.textContent = savedCount; el.resMelted.textContent = meltedCount;
  el.resObit.textContent = meltJokes.length ? pick(meltJokes) : "Zero melts. Legal is thrilled.";
  el.resBtn.textContent = win ? (level.endless || levelIndex < LEVELS.length-1 ? 'NEXT SHIFT' : 'ENDLESS MODE')
                              : (level.endless ? 'NEW RUN' : 'TRY AGAIN');
  if(level.endless){
    endlessChilled += savedCount;
    if(!win){ // run over — this is the score
      lastRun = { day: endlessDay, chilled: endlessChilled };
      const best = JSON.parse(localStorage.getItem('bth_best')||'null');
      if(!best || lastRun.day > best.day || (lastRun.day === best.day && lastRun.chilled > best.chilled))
        localStorage.setItem('bth_best', JSON.stringify(lastRun));
      el.resKicker.textContent = `Run over — Day ${lastRun.day} · ${lastRun.chilled} chilled total`;
      if(LB.key){
        el.lbSubmit.classList.remove('hidden');
        el.lbName.value = localStorage.getItem('bth_name')||'';
        el.lbMsg.textContent = 'Post your run to the Hall of Legends?';
        el.lbSendBtn.disabled = false;
      }
    }
  }
  el.resultModal.classList.remove('hidden');
  if(win){
    sfx.win();
    if(!level.endless){
      unlocked = Math.max(unlocked, levelIndex+1);
      localStorage.setItem('bth_unlocked', unlocked);
    }
  } else sfx.lose();
}

async function openLeaderboard(hl){
  el.lbModal.classList.remove('hidden');
  const best = JSON.parse(localStorage.getItem('bth_best')||'null');
  const bestLine = best ? `Your best: Day ${best.day} · 🧊${best.chilled}` : '';
  if(!LB.key){
    el.lbList.innerHTML = `<div class="brief">${bestLine || 'No endless runs yet — beat the campaign to unlock Infinite Summer.'}<br><br><i>Global board coming online soon.</i></div>`;
    return;
  }
  el.lbList.innerHTML = '<div class="brief">loading…</div>';
  try{
    const rows = await lbTop();
    el.lbList.innerHTML = (rows.length
      ? rows.map((r,i)=>`<div class="lbrow${hl && r.name===hl ? ' me':''}"><span class="rank">${i+1}</span><span class="nm">${escapeHtml(r.name)}</span><span class="sc">Day ${r.day} · 🧊${r.chilled}</span></div>`).join('')
      : '<div class="brief">Nobody has survived Infinite Summer yet. Be the first.</div>')
      + (bestLine ? `<div class="brief" style="margin-top:10px">${bestLine}</div>` : '');
  }catch(err){
    el.lbList.innerHTML = '<div class="brief">Couldn’t reach the leaderboard. It’s probably too hot.</div>';

/* ---------------- input ---------------- */
canvas.addEventListener('pointermove', e=>{
  if((S.mode==='playing'||S.mode==='plan') && selectedTool) hoverPos = toWorld(e.clientX, e.clientY);
});
canvas.addEventListener('pointerdown', e=>{
  if(S.mode!=='playing' && S.mode!=='plan') return;
  const p = toWorld(e.clientX, e.clientY);
  if(selectedTool){
    if(p.y < 120){ toast("Not there — the street, ideally."); return; } // genuinely the sky
    const px = clamp(p.x, 18, W-18), py = clamp(p.y, 228, 702); // nudge stray taps onto the street
    const def = TOOL_DEFS[selectedTool];
    const item = { key:selectedTool, x:px, y:py, radius:def.radius, t:0, emit:0 };
    if(selectedTool==='cart') item.stock = level.cartStock;
    placed.push(item);
    toolStock[selectedTool]--;
    sfx.place();
    burst(px, py, 10, '#ffffff', 60);
    if(toolStock[selectedTool]<=0) selectedTool=null;
    el.hint.classList.toggle('show', !!selectedTool);
    hoverPos=null; refreshToolbar();
    return;
  }
  // spin a rotunda
  for(let i=0;i<rotors.length;i++){
    const r = rotors[i];
    if(dist2(p.x, p.y, r.x, r.y - r.z) >= (r.r+10)*(r.r+10)) continue;
    const occupied = walkers.some(w => w.state==='walk' && w.d > r.dIn - 4 && w.d < r.dOut + 4);
    if(occupied){
      r.wob = 1; sfx.buzz();
      toast("There are PEOPLE on that.");
    } else {
      tapRotor(i);
      if(r.link != null) rotors[r.link].wob = 0.4; // show the gearing
    }
    return;
  }
  if(S.mode==='plan') return;
  // fan a walker
  let best=null, bd=42*42;
  for(const w of walkers){
    if(w.state!=='walk') continue;
    const pos = path.at(w.d);
    const d2 = dist2(p.x, p.y, pos.x, pos.y-(pos.z||0)-14);
    if(d2 < bd){ bd=d2; best=w; }
  }
  if(best && best.fanCd<=0){
    best.heat = Math.max(0, best.heat - 9);
    best.fanCd = 1.1;
    const pos = path.at(best.d);
    swirl(pos.x, pos.y-(pos.z||0)-16);
    sfx.fan();
  }
});
document.addEventListener('gesturestart', e=>e.preventDefault());

/* ---------------- particles ---------------- */
function burst(x,y,n,color,spd){
  for(let i=0;i<n;i++){
    const a = rand(0,TAU), s = rand(spd*0.3, spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:rand(.4,.8),max:.8,type:'dot',color,size:rand(2,3.5)});
  }
}
function swirl(x,y){
  for(let i=0;i<8;i++){
    const a = i/8*TAU;
    particles.push({x:x+Math.cos(a)*10, y:y+Math.sin(a)*7, vx:Math.cos(a+1.7)*46, vy:Math.sin(a+1.7)*30-12, life:.5, max:.5, type:'dot', color:'#DFF3FF', size:2.6});
  }
}
function sweatDrop(x,y){
  particles.push({x:x+rand(-6,6), y, vx:rand(-14,14), vy:rand(-46,-20), life:.7, max:.7, type:'drop', color:'#9AD6F0', size:rand(2,3)});
}
function sprinkDrop(x,y,r){
  const a = rand(0,TAU), rr = rand(6, r*0.9);
  particles.push({x, y, vx:Math.cos(a)*rr*1.9, vy:Math.sin(a)*rr*1.1-64, life:.8, max:.8, type:'drop', color:'#8FCDEA', size:rand(1.8,3)});
}
function splash(x,y){
  for(let i=0;i<16;i++){
    const a = rand(-Math.PI, 0), s = rand(45, 120);
    particles.push({x, y, vx:Math.cos(a)*s*0.6, vy:Math.sin(a)*s, life:rand(.4,.85), max:.85, type:'drop', color:'#BFE9F7', size:rand(2,3.8)});
  }
  particles.push({x, y, vx:0, vy:0, life:.6, max:.6, type:'ripple', color:'#FFFFFF', size:8});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    if(p.type==='ripple') continue; // ripples just expand where they are
    p.vy += (p.type==='drop'?260:120)*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
  }
}

/* ---------------- simulation ---------------- */
function update(dt){
  if(S.mode!=='plan' && S.mode!=='playing') return;
  for(const r of rotors){
    r.angle += (r.target - r.angle) * Math.min(1, dt*7);
    r.wob = Math.max(0, r.wob - dt*2);
  }
  if(S.mode==='plan'){ refreshOpenBtn(); updateParticles(dt); return; }

  dt *= timeScale; // ⏩
  playT += dt;

  if(spawned < level.count){
    spawnTimer -= dt;
    if(spawnTimer<=0){ spawnWalker(); spawnTimer = level.interval * rand(0.85,1.15); }
  }

  for(const item of placed){
    item.t += dt;
    if(item.key==='sprinkler'){
      item.emit -= dt;
      if(item.emit<=0){ sprinkDrop(item.x, item.y-14, item.radius); sprinkDrop(item.x, item.y-14, item.radius); item.emit = 0.05; }
    }
  }

  for(let i=walkers.length-1;i>=0;i--){
    const w = walkers[i];
    w.fanCd -= dt; w.phase += dt*(w.waiting ? 2 : 9);
    if(w.state==='walk'){
      let nd = w.d + w.speed*dt * (w.popT>0 ? 1.06 : 1);
      w.waiting = false;
      for(const r of rotors){
        if(!rotorAligned(r) && w.d < r.dIn - 2 && nd >= r.dIn - 2){
          nd = r.dIn - 2; w.waiting = true; break; // queue at the gap, in the sun, furious
        }
      }
      w.d = nd;
      const pos = path.at(w.d);
      // environment
      let factor = 1, cool = 0, scorchMul = 1;
      for(const zc of scorchZones)
        if(dist2(pos.x, pos.y, zc.x, zc.y) < zc.r*zc.r) scorchMul = 2;
      for(const item of placed){
        const d2v = dist2(pos.x,pos.y,item.x,item.y);
        if(d2v > item.radius*item.radius) continue;
        if(item.key==='umbrella') factor = Math.min(factor, 0.1);
        else if(item.key==='sprinkler') cool += TOOL_DEFS.sprinkler.cool;
        else if(item.key==='cart' && item.stock>0 && w.popT<=0 && !w.hadPop){
          item.stock--; w.popT = 7; w.hadPop = true;
          w.heat = Math.max(0, w.heat-16);
          sfx.pop(); burst(pos.x,pos.y-20,8,'#FF9EC0',50);
        }
      }
      if(w.popT>0){ factor *= 0.45; w.popT -= dt; }
      w.heat += (level.heat*factor*scorchMul*(w.heatMul||1) - cool) * dt;
      w.heat = clamp(w.heat, 0, 100);
      if(w.heat > 55 && Math.random() < dt*(w.heat/22)) sweatDrop(pos.x, pos.y-(pos.z||0)-24);
      if(w.heat >= 100){
        w.state='melt'; w.t=0;
        sfx.melt();
        if(navigator.vibrate) navigator.vibrate(60);
        const line = pick(MELT_LINES).replace('%s', w.name);
        meltJokes.push(line); toast(line);
      } else if(w.d >= path.length - 4){
        w.state='enter'; w.t=0;
      }
    } else if(w.state==='enter'){
      w.t += dt;
      if(w.t >= 0.55){
        savedCount += w.worth || 1; el.saved.textContent = savedCount;
        sfx.save();
        splash(path.end.x, path.end.y+6);
        if(w.type==='vip') toast(`${w.name} made it! Worth 3. Bonuses for everyone (no).`, true);
        else if(Math.random()<0.28) toast(pick(SAVE_LINES).replace('%s', w.name), true);
        walkers.splice(i,1);
      }
    } else if(w.state==='melt'){
      w.t += dt/1.15;
      if(w.t>=1){
        const pos = path.at(w.d);
        puddles.push({x:pos.x, y:pos.y-(pos.z||0), color:w.shirt, tieHue:w.tieHue, hasBag:w.hasBag, r:rand(15,19), wob:rand(0,TAU)});
        meltedCount++; el.melted.textContent = meltedCount;
        walkers.splice(i,1);
      }
    }
  }

  updateParticles(dt);

  if(spawned >= level.count && walkers.length===0 && endTimer<0) endTimer = 0.9;
  if(endTimer>=0){ endTimer -= dt; if(endTimer<=0) finishLevel(); }
}

/* ============================================================
   RENDERING
   ============================================================ */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawBackground(t){
  const pal = (level && PALETTES[level.pal]) || PALETTES[2];
  // screen-space sky + ground so letterboxing looks intentional
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const horizon = offY + 208*scale;
  const sky = ctx.createLinearGradient(0,0,0,horizon);
  sky.addColorStop(0,pal.skyTop); sky.addColorStop(0.6,pal.skyMid); sky.addColorStop(1,pal.skyBot);
  ctx.fillStyle = sky; ctx.fillRect(0,0,cw,horizon);
  const gnd = ctx.createLinearGradient(0,horizon,0,ch);
  gnd.addColorStop(0,pal.g1); gnd.addColorStop(1,pal.g2);
  ctx.fillStyle = gnd; ctx.fillRect(0,horizon,cw,ch-horizon);

  // world space
  ctx.setTransform(dpr*scale,0,0,dpr*scale,dpr*offX,dpr*offY);

  // sun
  const sx = W-84, sy = 92, pulse = 1+Math.sin(t*1.4)*0.03;
  for(let i=3;i>=1;i--){
    ctx.fillStyle = `rgba(255,214,107,${0.10*i})`;
    ctx.beginPath(); ctx.arc(sx,sy,(34+i*17)*pulse,0,TAU); ctx.fill();
  }
  ctx.fillStyle = '#FFD66B';
  ctx.beginPath(); ctx.arc(sx,sy,34*pulse,0,TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.beginPath(); ctx.arc(sx-10,sy-11,9,0,TAU); ctx.fill();

  // distant skyline silhouettes
  ctx.fillStyle = pal.sil;
  for(const [bx,bw,bh] of [[6,42,64],[52,30,40],[150,38,52],[196,26,34],[250,40,46],[372,40,58]]){
    ctx.fillRect(bx, 208-bh, bw, bh);
    ctx.fillRect(bx+bw*0.3, 208-bh-6, bw*0.4, 6);
  }
  // heat shimmer squiggles above horizon
  ctx.strokeStyle = 'rgba(255,255,255,.28)'; ctx.lineWidth = 1.6; ctx.lineCap='round';
  for(let i=0;i<5;i++){
    const px = 40+i*80 + Math.sin(t*0.7+i)*8;
    const py = 190 - ((t*22 + i*31) % 70);
    const a = clamp(1-((190-py)/70),0,1)*0.5;
    ctx.globalAlpha = a;
    ctx.beginPath();
    for(let j=0;j<=12;j++) ctx.lineTo(px + Math.sin(j*0.9 + t*6+i)*4, py - j*2.2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPathRibbon(){
  const pts = path.pts, w = 14;
  // rotundas own their spans of the path — the ribbon breaks around them
  const gap = p => rotors.some(r => dist2(p.x, p.y, r.x, r.y) < (r.r-8)*(r.r-8));
  const stroked = (fx, fy) => {
    ctx.beginPath(); let pen = false;
    for(const p of pts){
      if(gap(p)){ pen = false; continue; }
      pen ? ctx.lineTo(fx(p), fy(p)) : (ctx.moveTo(fx(p), fy(p)), pen = true);
    }
    ctx.stroke();
  };
  ctx.lineCap='round'; ctx.lineJoin='round';
  // shadow cast on the plaza below
  ctx.strokeStyle = 'rgba(120,60,40,.20)'; ctx.lineWidth = 32;
  stroked(p=>p.x+p.z*0.22+4, p=>p.y+4);
  // slender support columns beneath the floating deck
  let acc = 0;
  for(let i=1;i<pts.length;i++){
    const p = pts[i];
    acc += Math.hypot(p.x-pts[i-1].x, p.y-pts[i-1].y);
    if(acc < 85 || p.z < 26 || gap(p)) continue;
    acc = 0;
    const top = p.y - p.z + 15, bot = p.y + 3;
    ctx.fillStyle = 'rgba(120,60,40,.18)';
    ctx.beginPath(); ctx.ellipse(p.x + p.z*0.22 + 3, bot+2, 9, 3.4, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = '#C08558'; ctx.fillRect(p.x-4.5, top, 9, bot-top);
    ctx.fillStyle = '#A96F47'; ctx.fillRect(p.x+0.5, top, 4, bot-top);   // shaded half
    ctx.fillStyle = '#CE9264'; ctx.fillRect(p.x-6.5, top, 13, 4);        // capital
    ctx.fillStyle = '#B37A4E'; ctx.fillRect(p.x-6.5, bot-3, 13, 3);      // base
  }
  // extruded deck side — a floating slab, monument-style faceted shading
  const deckBottom = p => Math.min(p.y + p.ny*w + 2, p.y + p.ny*w - p.z + 17);
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1], b=pts[i];
    if((a.z<1 && b.z<1) || gap(a) || gap(b)) continue;
    const tx=b.x-a.x, len=Math.hypot(tx,b.y-a.y)||1;
    const shade = 0.72 + 0.24*Math.max(0, tx/len);
    ctx.fillStyle = ctx.strokeStyle = `rgb(${Math.round(219*shade)},${Math.round(154*shade)},${Math.round(108*shade)})`;
    ctx.lineWidth = 1.5; // stroke seals antialiasing seams between quads
    ctx.beginPath();
    ctx.moveTo(a.x+a.nx*w, a.y+a.ny*w - a.z);
    ctx.lineTo(b.x+b.nx*w, b.y+b.ny*w - b.z);
    ctx.lineTo(b.x+b.nx*w, deckBottom(b));
    ctx.lineTo(a.x+a.nx*w, deckBottom(a));
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  // walkway top (drawn at elevation)
  ctx.strokeStyle = '#FBEED3'; ctx.lineWidth = 30;
  stroked(p=>p.x, p=>p.y-p.z);
  // front-edge lip for definition
  ctx.strokeStyle = 'rgba(200,140,95,.45)'; ctx.lineWidth = 2.5;
  stroked(p=>p.x+p.nx*w, p=>p.y+p.ny*w-p.z);
  // dashed center line
  ctx.strokeStyle = 'rgba(224,158,111,.55)'; ctx.lineWidth = 2; ctx.setLineDash([8,10]);
  stroked(p=>p.x, p=>p.y-p.z);
  ctx.setLineDash([]);
}

function drawRotors(t){
  for(const R of rotors){
    const r = R.r, x = R.x, y = R.y - R.z;
    const wobble = Math.sin(t*40) * R.wob * 0.06;
    // ground shadow
    ctx.fillStyle = 'rgba(120,60,40,.20)';
    ctx.beginPath(); ctx.ellipse(R.x + R.z*0.22 + 4, R.y + 4, r*0.95, r*0.42, 0, 0, TAU); ctx.fill();
    // centre column down to the plaza
    ctx.fillStyle = '#B37A4E'; ctx.fillRect(x-8, y+r*0.3, 16, R.y - y - r*0.3 + 3);
    ctx.fillStyle = '#A96F47'; ctx.fillRect(x+1, y+r*0.3, 7, R.y - y - r*0.3 + 3);
    // slab side
    ctx.fillStyle = '#C98F60';
    ctx.beginPath(); ctx.ellipse(x, y+15, r, r*0.62, 0, 0, TAU); ctx.fill();
    // disc top
    ctx.fillStyle = '#EED9B7';
    ctx.beginPath(); ctx.ellipse(x, y, r, r*0.62, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(200,140,95,.5)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(x, y, r, r*0.62, 0, 0, TAU); ctx.stroke();
    // gear teeth if linked — hints that it turns a partner
    if(R.link != null){
      ctx.fillStyle = 'rgba(200,140,95,.65)';
      for(let i=0;i<8;i++){
        const a = i/8*TAU + R.angle*0.5;
        ctx.beginPath();
        ctx.ellipse(x+Math.cos(a)*r, y+Math.sin(a)*r*0.62, 4, 3, a, 0, TAU); ctx.fill();
      }
    }
    // invite-a-tap pulse while misaligned
    if(!rotorAligned(R)){
      ctx.strokeStyle = `rgba(255,255,255,${0.35 + Math.sin(t*4)*0.25})`; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(x, y, r+7, (r+7)*0.62, 0, 0, TAU); ctx.stroke();
    }
    // rotating bridge bar, drawn in the disc's squashed space
    const base = Math.atan2(Math.sin(R.base)/0.62, Math.cos(R.base));
    ctx.save();
    ctx.translate(x, y); ctx.scale(1, 0.62); ctx.rotate(base + R.angle + wobble);
    ctx.fillStyle = '#FBEED3';
    roundRect(-r+3, -15, 2*r-6, 30, 15); ctx.fill();
    ctx.strokeStyle = 'rgba(224,158,111,.55)'; ctx.lineWidth = 2; ctx.setLineDash([8,10]);
    ctx.beginPath(); ctx.moveTo(-r+10, 0); ctx.lineTo(r-10, 0); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
    // pivot cap
    ctx.fillStyle = '#D77A63';
    ctx.beginPath(); ctx.ellipse(x, y, 7, 4.6, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.ellipse(x-1.6, y-1.2, 2.2, 1.4, 0, 0, TAU); ctx.fill();
  }
}

function drawScorch(t){
  for(const zc of scorchZones){
    const y = zc.y - zc.z;
    const pulse = 0.3 + Math.sin(t*3 + zc.x)*0.1;
    const g = ctx.createRadialGradient(zc.x, y, 4, zc.x, y, zc.r);
    g.addColorStop(0, `rgba(255,90,40,${pulse+0.15})`);
    g.addColorStop(1, 'rgba(255,90,40,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(zc.x, y, zc.r, zc.r*0.62, 0, 0, TAU); ctx.fill();
    // cracked asphalt
    ctx.strokeStyle = `rgba(190,50,25,${0.5+pulse*0.4})`; ctx.lineWidth = 1.8; ctx.lineCap='round';
    for(let i=0;i<4;i++){
      const a = i/4*TAU + 0.6;
      ctx.beginPath();
      ctx.moveTo(zc.x + Math.cos(a)*5, y + Math.sin(a)*3);
      ctx.lineTo(zc.x + Math.cos(a)*16 + (i%2?4:-3), y + Math.sin(a)*10);
      ctx.lineTo(zc.x + Math.cos(a)*24, y + Math.sin(a)*14 + (i%2?-2:2));
      ctx.stroke();
    }
    // rising heat motes
    if(Math.random() < 0.15)
      particles.push({x:zc.x+rand(-zc.r*0.5,zc.r*0.5), y:y-4, vx:rand(-4,4), vy:rand(-34,-20), life:.7, max:.7, type:'dot', color:'rgba(255,120,60,.7)', size:rand(1.5,2.6)});
  }
}

function drawBuilding(door, kind, t){
  // axonometric-ish prism, Monument Valley pastel
  const bw = 108, bh = 148, depth = 20;
  const x = clamp(door.x - bw/2, 4, W-bw-4);
  const y = door.y - bh;
  const main = kind==='hot' ? '#D77A63' : '#66AFA6';
  const dark = kind==='hot' ? '#B85E4C' : '#4E938B';
  const light = kind==='hot' ? '#E89B82' : '#8CC7BE';

  // side + top for depth
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(x+bw,y); ctx.lineTo(x+bw+depth,y-depth*0.7); ctx.lineTo(x+bw+depth,y+bh-depth*0.7); ctx.lineTo(x+bw,y+bh); ctx.closePath(); ctx.fill();
  ctx.fillStyle = light;
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(x+depth,y-depth*0.7); ctx.lineTo(x+bw+depth,y-depth*0.7); ctx.lineTo(x+bw,y); ctx.closePath(); ctx.fill();
  // face
  ctx.fillStyle = main;
  ctx.fillRect(x,y,bw,bh);

  // windows
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const wx = x+13+c*22, wy = y+14+r*24;
    ctx.fillStyle = kind==='hot' ? 'rgba(255,220,160,.85)' : 'rgba(210,245,255,.9)';
    roundRect(wx,wy,14,16,3); ctx.fill();
    if(kind==='cool' && (r+c)%2===0){ // frosty glow
      ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillRect(wx,wy+11,14,5);
    }
  }
  // rooftop water tower (hot building only)
  if(kind==='hot'){
    const wx = x+bw-34, wb = y - depth*0.7;
    ctx.strokeStyle='#8A5A45'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(wx+5, wb-8); ctx.lineTo(wx+3, wb+1); ctx.moveTo(wx+17, wb-8); ctx.lineTo(wx+19, wb+1); ctx.stroke();
    ctx.fillStyle='#B98A5A'; roundRect(wx+1, wb-24, 20, 16, 3); ctx.fill();
    ctx.strokeStyle='rgba(90,50,35,.4)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(wx+2, wb-19); ctx.lineTo(wx+20, wb-19); ctx.moveTo(wx+2, wb-13); ctx.lineTo(wx+20, wb-13); ctx.stroke();
    ctx.fillStyle='#8F5B48';
    ctx.beginPath(); ctx.moveTo(wx-2, wb-24); ctx.lineTo(wx+24, wb-24); ctx.lineTo(wx+11, wb-34); ctx.closePath(); ctx.fill();
  }
  // door arch
  const dx = clamp(door.x, x+22, x+bw-22);
  ctx.fillStyle = kind==='hot' ? '#7E4638' : '#2E6B64';
  ctx.beginPath();
  ctx.moveTo(dx-15, y+bh); ctx.lineTo(dx-15, y+bh-30);
  ctx.arc(dx, y+bh-30, 15, Math.PI, 0);
  ctx.lineTo(dx+15, y+bh); ctx.closePath(); ctx.fill();
  if(kind==='cool'){ // cold air wafting out
    ctx.fillStyle = `rgba(200,240,255,${0.35+Math.sin(t*3)*0.15})`;
    ctx.beginPath(); ctx.ellipse(dx, y+bh-6, 22, 8, 0, 0, TAU); ctx.fill();
    // AC units
    for(const ax of [x+10, x+bw-34]){
      ctx.fillStyle='#DDEDEA'; roundRect(ax, y-16, 24, 14, 3); ctx.fill();
      ctx.strokeStyle='#4E938B'; ctx.lineWidth=1.5;
      for(let i=1;i<3;i++){ ctx.beginPath(); ctx.moveTo(ax+4, y-16+i*4.5); ctx.lineTo(ax+20, y-16+i*4.5); ctx.stroke(); }
    }
  }
  // signage
  ctx.fillStyle = '#FFF6E8';
  const sign = kind==='hot' ? 'HOT DESK INC.' : '❄ THE COOL BLDG';
  ctx.font = '800 10px system-ui, sans-serif';
  const tw = ctx.measureText(sign).width;
  ctx.fillStyle = 'rgba(0,0,0,.18)'; roundRect(x+bw/2-tw/2-6, y+bh-52, tw+12, 15, 4); ctx.fill();
  ctx.fillStyle = '#FFF6E8'; ctx.fillText(sign, x+bw/2-tw/2, y+bh-41);
}

function drawPool(end, t){
  const cx = clamp(end.x + 4, 100, W-96), cy = clamp(end.y + 14, 250, H-50);
  // deck
  ctx.fillStyle = '#F3DDBE';
  ctx.beginPath(); ctx.ellipse(cx, cy, 90, 47, 0, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(150,100,70,.25)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 90, 47, 0, 0, TAU); ctx.stroke();
  // water
  ctx.fillStyle = '#7FD1E8';
  ctx.beginPath(); ctx.ellipse(cx, cy, 72, 36, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#5BBCDD';
  ctx.beginPath(); ctx.ellipse(cx+4, cy+4, 58, 27, 0, 0, TAU); ctx.fill();
  // inner rim shadow — the water has depth now
  ctx.strokeStyle = 'rgba(25,85,115,.28)'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.ellipse(cx, cy+1, 68, 33, 0, Math.PI, TAU); ctx.stroke();
  // drifting shimmer lines
  ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for(let i=0;i<4;i++){
    const ph = (t*0.35 + i*0.25) % 1;
    const yy = cy - 20 + ph*40, ww = 44*(1 - Math.abs(ph-0.5)*1.6);
    if(ww <= 4) continue;
    ctx.globalAlpha = 0.7*(1 - Math.abs(ph-0.5)*2);
    ctx.beginPath(); ctx.moveTo(cx-ww, yy); ctx.quadraticCurveTo(cx, yy+3, cx+ww, yy); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // pink donut floatie, drifting
  const fx = cx - 22 + Math.sin(t*0.6)*8, fy = cy + 6 + Math.cos(t*0.45)*3;
  ctx.fillStyle = '#FF8FAF';
  ctx.beginPath(); ctx.ellipse(fx, fy, 11, 7, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#5BBCDD';
  ctx.beginPath(); ctx.ellipse(fx, fy, 5, 3, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(fx-4, fy-3, 3, 1.6, -0.4, 0, TAU); ctx.fill();
  // somebody already made it: bobbing head + drink
  const bx = cx + 26, by = cy - 2 + Math.sin(t*1.3)*1.6;
  ctx.fillStyle = '#E8B48A';
  ctx.beginPath(); ctx.arc(bx, by, 5.5, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#3B2B27';
  ctx.beginPath(); ctx.arc(bx, by-2.2, 4.6, Math.PI*1.1, Math.PI*1.9); ctx.fill();
  ctx.fillStyle = '#FF6B52';
  roundRect(bx+8, by-6, 4, 7, 1.5); ctx.fill(); // tiny cocktail
  // beach umbrella on the deck
  const ux = cx + 64, uy = cy - 24;
  ctx.strokeStyle = '#8A5A45'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(ux, uy+16); ctx.lineTo(ux, uy-14); ctx.stroke();
  ctx.fillStyle = '#FFD66B';
  ctx.beginPath(); ctx.arc(ux, uy-14, 20, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF8B7E';
  for(let i=0;i<2;i++){
    const a0 = Math.PI + (i*2+0.5)*(Math.PI/4);
    ctx.beginPath(); ctx.moveTo(ux, uy-14); ctx.arc(ux, uy-14, 20, a0, a0+Math.PI/4); ctx.closePath(); ctx.fill();
  }
  // sign
  const sign = '❄ THE PUBLIC POOL';
  ctx.font = '800 10px system-ui, sans-serif';
  const tw = ctx.measureText(sign).width;
  ctx.fillStyle = 'rgba(0,0,0,.18)'; roundRect(cx-tw/2-6, cy-72, tw+12, 15, 4); ctx.fill();
  ctx.fillStyle = '#FFF6E8'; ctx.fillText(sign, cx-tw/2, cy-61);
}

function drawTool(item, t, ghost=false){
  const {x,y} = item;
  ctx.save();
  if(ghost) ctx.globalAlpha = 0.55;
  if(item.key==='umbrella'){
    // coverage shade
    ctx.fillStyle = 'rgba(96,70,140,.11)';
    ctx.beginPath(); ctx.ellipse(x,y,item.radius,item.radius*0.62,0,0,TAU); ctx.fill();
    // pole
    ctx.strokeStyle = '#8A5A45'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y-38); ctx.stroke();
    // scalloped canopy
    const R = 30, wob = Math.sin(t*2+x)*1.5;
    ctx.fillStyle = '#FF8B7E';
    ctx.beginPath(); ctx.arc(x, y-38+wob*0.3, R, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FFD3B8';
    for(let i=0;i<4;i++){
      if(i%2===0) continue;
      const a0 = Math.PI + i*(Math.PI/4), a1 = a0 + Math.PI/4;
      ctx.beginPath(); ctx.moveTo(x, y-38+wob*0.3);
      ctx.arc(x, y-38+wob*0.3, R, a0, a1); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = '#FF8B7E';
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.arc(x-R+i*(R/2), y-38+wob*0.3, R/4.4, 0, Math.PI); ctx.fill();
    }
  } else if(item.key==='sprinkler'){
    ctx.fillStyle = 'rgba(110,180,220,.16)';
    ctx.beginPath(); ctx.ellipse(x,y,item.radius,item.radius*0.62,0,0,TAU); ctx.fill();
    // hydrant body
    ctx.fillStyle = '#5FA8DE';
    roundRect(x-8, y-20, 16, 20, 5); ctx.fill();
    ctx.fillStyle = '#4187BD';
    ctx.beginPath(); ctx.arc(x, y-20, 9, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#BFE3F7';
    ctx.beginPath(); ctx.arc(x, y-26, 3.6, 0, TAU); ctx.fill();
    // spray arcs
    ctx.strokeStyle = 'rgba(190,230,250,.8)'; ctx.lineWidth = 2;
    for(let i=0;i<3;i++){
      const ph = (t*2.4+i/3)%1;
      ctx.globalAlpha = (ghost?0.4:1)*(1-ph)*0.8;
      ctx.beginPath(); ctx.ellipse(x, y-8, 14+ph*item.radius*0.8, (14+ph*item.radius*0.8)*0.5, 0, 0, TAU); ctx.stroke();
    }
    ctx.globalAlpha = ghost?0.55:1;
  } else if(item.key==='cart'){
    ctx.fillStyle = 'rgba(255,160,190,.12)';
    ctx.beginPath(); ctx.ellipse(x,y,item.radius,item.radius*0.62,0,0,TAU); ctx.fill();
    // cart
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    ctx.beginPath(); ctx.ellipse(x, y+2, 20, 5, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = '#FFF1F5';
    roundRect(x-17, y-24, 34, 22, 4); ctx.fill();
    ctx.fillStyle = '#FF9EC0';
    roundRect(x-17, y-24, 34, 7, 4); ctx.fill();
    // wheels
    ctx.fillStyle = '#5A3A4A';
    ctx.beginPath(); ctx.arc(x-9, y+1, 3.6, 0, TAU); ctx.arc(x+9, y+1, 3.6, 0, TAU); ctx.fill();
    // striped awning
    const aw = 42, ah = 9, ay = y-38;
    for(let i=0;i<6;i++){
      ctx.fillStyle = i%2 ? '#FF8FAF':'#FFF6E8';
      ctx.fillRect(x-aw/2 + i*(aw/6), ay, aw/6, ah);
    }
    ctx.fillStyle = '#FF8FAF';
    for(let i=0;i<6;i++){ ctx.beginPath(); ctx.arc(x-aw/2+aw/12 + i*(aw/6), ay+ah, aw/12, 0, Math.PI); ctx.fill(); }
    ctx.strokeStyle = '#C87A93'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-aw/2+2, ay+ah); ctx.lineTo(x-15,y-24); ctx.moveTo(x+aw/2-2, ay+ah); ctx.lineTo(x+15,y-24); ctx.stroke();
    // popsicle on top + stock
    ctx.fillStyle = '#8FE0C8'; roundRect(x-3, y-33, 6, 9, 3); ctx.fill();
    if(!ghost){
      ctx.fillStyle = '#5A3A4A'; ctx.font='800 9px system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText(item.stock>0 ? '×'+item.stock : 'SOLD OUT', x, y+13);
      ctx.textAlign='left';
    }
  }
  ctx.restore();
}

function drawPuddle(p, t){
  const w1 = Math.sin(t*2+p.wob)*1.5, w2 = Math.cos(t*1.6+p.wob)*1.2;
  ctx.fillStyle = p.color;
  ctx.globalAlpha = 0.85;
  ctx.beginPath(); ctx.ellipse(p.x, p.y, p.r+w1, (p.r+w2)*0.5, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.beginPath(); ctx.ellipse(p.x-p.r*0.3, p.y-2, p.r*0.28, p.r*0.13, 0, 0, TAU); ctx.fill();
  // the tie floats. respectfully.
  ctx.save();
  ctx.translate(p.x+4, p.y+1); ctx.rotate(Math.sin(t*1.4+p.wob)*0.2);
  ctx.fillStyle = `hsl(${p.tieHue} 60% 55%)`;
  ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(3,0); ctx.lineTo(0,7); ctx.lineTo(-3,0); ctx.closePath(); ctx.fill();
  ctx.restore();
  if(p.hasBag){
    ctx.fillStyle = '#8A5A45';
    roundRect(p.x-p.r-3, p.y-5, 9, 7, 2); ctx.fill();
  }
}

function drawWalker(w, t){
  const pos = path.at(w.d);
  const elev = pos.z || 0;
  const facing = pos.dx >= 0 ? 1 : -1;
  const heat = w.heat/100;
  const bob = Math.sin(w.phase)*1.6;
  const slump = heat*0.5; // lean forward as they cook

  let sy = 1, meltDrop = 0;
  if(w.state==='melt'){ sy = 1-w.t; meltDrop = (1-sy)*22; }
  let alpha = 1, hop = 0;
  if(w.state==='enter'){ // the cannonball
    const ht = Math.min(w.t/0.55, 1);
    hop = Math.sin(ht*Math.PI)*18;
    alpha = 1 - Math.max(0, (w.t-0.34)/0.21);
  }

  ctx.save();
  ctx.translate(pos.x, pos.y - elev - hop);
  ctx.globalAlpha = alpha;

  // shadow
  ctx.fillStyle = 'rgba(120,60,40,.25)';
  ctx.beginPath(); ctx.ellipse(0, 2, 10*(2-sy), 3.4, 0, 0, TAU); ctx.fill();

  // melt puddle forming beneath
  if(w.state==='melt'){
    ctx.fillStyle = w.shirt;
    ctx.beginPath(); ctx.ellipse(0, 2, 4+w.t*14, 2+w.t*6, 0, 0, TAU); ctx.fill();
  }

  ctx.scale(facing, sy);
  ctx.translate(0, 0);
  ctx.rotate(slump*0.25 + (w.state==='melt' ? Math.sin(w.t*20)*0.08 : 0));

  const shirtCol = hexLerp(w.shirt, '#FF6B52', heat*0.75);
  const skinCol  = hexLerp(w.skin, '#F08060', heat*0.5);

  // legs (little walk cycle)
  const lp = Math.sin(w.phase), ln = -lp;
  ctx.strokeStyle = w.pants; ctx.lineWidth = 4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2, -12+bob*0.3); ctx.lineTo(-2+lp*4, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, -12+bob*0.3); ctx.lineTo(2+ln*4, 0); ctx.stroke();
  // loafers
  ctx.fillStyle = '#6B4226';
  ctx.beginPath(); ctx.ellipse(-2+lp*4+1.5, 0.5, 3, 1.8, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2+ln*4+1.5, 0.5, 3, 1.8, 0, 0, TAU); ctx.fill();

  // body (rolled-sleeves shirt)
  ctx.fillStyle = shirtCol;
  roundRect(-7, -26+bob+meltDrop*0.3, 14, 16, 5); ctx.fill();
  // tie (or lanyard) — the VP's is gold, obviously
  ctx.fillStyle = w.type==='vip' ? '#F5C542' : `hsl(${w.tieHue} 60% 52%)`;
  ctx.beginPath(); ctx.moveTo(0,-25+bob); ctx.lineTo(2,-21+bob); ctx.lineTo(0,-14+bob); ctx.lineTo(-2,-21+bob); ctx.closePath(); ctx.fill();
  // arms + briefcase
  ctx.strokeStyle = skinCol; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-6,-22+bob); ctx.lineTo(-8+ln*2, -13+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-22+bob); ctx.lineTo(8+lp*2, -13+bob); ctx.stroke();
  if(w.hasBag){
    ctx.fillStyle = '#8A5A45';
    roundRect(5+lp*2, -13+bob, 9, 7, 1.5); ctx.fill();
    ctx.fillStyle = '#6E4636'; ctx.fillRect(8+lp*2, -13+bob, 3, 2);
  }
  // popsicle!
  if(w.popT>0){
    ctx.save(); ctx.translate(-9+ln*2, -15+bob);
    ctx.strokeStyle='#D8B88A'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-5); ctx.stroke();
    ctx.fillStyle='#8FE0C8'; roundRect(-2.6,-12,5.2,8,2.4); ctx.fill();
    ctx.restore();
  }

  // head
  const hy = -32+bob+meltDrop*0.5;
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.arc(0, hy, 6.5, 0, TAU); ctx.fill();
  // hair
  ctx.fillStyle = w.hair;
  ctx.beginPath(); ctx.arc(0, hy-2.4, 5.6, Math.PI*1.05, Math.PI*1.95); ctx.fill();
  if(w.type==='jogger'){ // sweatband
    ctx.fillStyle = '#FF5A76';
    ctx.fillRect(-5.4, hy-4.6, 10.8, 2.6);
  }
  // face: eyes + mouth by heat
  ctx.fillStyle = '#3A2530';
  if(heat < 0.85){
    ctx.beginPath(); ctx.arc(2.4, hy-0.5, 0.9, 0, TAU); ctx.arc(5.2, hy-0.5, 0.9, 0, TAU); ctx.fill();
  } else { // >< eyes
    ctx.strokeStyle='#3A2530'; ctx.lineWidth=1;
    for(const ex of [2.4,5.2]){
      ctx.beginPath(); ctx.moveTo(ex-1,hy-1.4); ctx.lineTo(ex+1,hy+0.4); ctx.moveTo(ex+1,hy-1.4); ctx.lineTo(ex-1,hy+0.4); ctx.stroke();
    }
  }
  if(w.glasses){
    ctx.strokeStyle='#3A2530'; ctx.lineWidth=0.9;
    ctx.beginPath(); ctx.arc(2.4,hy-0.5,2,0,TAU); ctx.arc(5.4,hy-0.5,2,0,TAU); ctx.stroke();
  }
  // mouth
  ctx.strokeStyle = '#3A2530'; ctx.lineWidth = 1.1;
  ctx.beginPath();
  if(heat<0.4) ctx.arc(3.6, hy+2.2, 1.6, 0.1, Math.PI-0.1);           // content
  else if(heat<0.75){ ctx.moveTo(2.2,hy+3); ctx.lineTo(5,hy+3); }     // grim
  else ctx.arc(3.6, hy+4.4, 1.6, Math.PI+0.15, TAU-0.15);             // despair
  ctx.stroke();
  // flushed cheeks
  if(heat>0.35){
    ctx.fillStyle = `rgba(240,90,70,${(heat-0.35)*0.9})`;
    ctx.beginPath(); ctx.arc(1.2,hy+1.6,1.4,0,TAU); ctx.arc(6.2,hy+1.6,1.4,0,TAU); ctx.fill();
  }

  ctx.restore();

  // impatient "…" while queued at the rotunda
  if(w.waiting && w.state==='walk'){
    const by = pos.y - elev - 52;
    ctx.fillStyle = 'rgba(255,246,232,.9)';
    roundRect(pos.x-11, by-6, 22, 12, 6); ctx.fill();
    ctx.fillStyle = '#5A3A4A';
    for(let i=0;i<3;i++){
      const on = Math.floor(t*2.5)%3 >= i ? 1 : 0.25;
      ctx.globalAlpha = on;
      ctx.beginPath(); ctx.arc(pos.x-5+i*5, by, 1.6, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // heat bar
  if(w.state==='walk' && w.heat>18){
    const bw = 18, bx = pos.x-bw/2, by = pos.y-elev-46;
    ctx.fillStyle='rgba(58,32,48,.35)'; roundRect(bx-1,by-1,bw+2,4.6,2.3); ctx.fill();
    ctx.fillStyle = heat<0.5 ? '#FFD66B' : heat<0.8 ? '#FF9A5C' : '#F0503C';
    roundRect(bx,by,bw*heat,2.6,1.3); ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = clamp(p.life/p.max, 0, 1);
    ctx.fillStyle = p.color;
    if(p.type==='ripple'){
      const grow = p.size + (1 - p.life/p.max) * 30;
      ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(p.x, p.y, grow, grow*0.45, 0, 0, TAU); ctx.stroke();
    } else if(p.type==='drop'){
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.size*0.7, p.size, 0, 0, TAU); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function render(t){
  drawBackground(t);
  if(S.mode==='title'){ return; }
  if(!path) return;

  drawPathRibbon();
  drawRotors(t);
  drawScorch(t);
  drawPool(path.end, t);
  for(const p of puddles) drawPuddle(p, t);
  drawBuilding(path.start, 'hot', t);

  // depth-sort placed tools + walkers by y
  const drawables = [];
  for(const item of placed) drawables.push({ y:item.y, fn:()=>drawTool(item, t) });
  for(const w of walkers){ const pos = path.at(w.d); drawables.push({ y:pos.y, fn:()=>drawWalker(w, t) }); }
  drawables.sort((a,b)=>a.y-b.y);
  for(const d of drawables) d.fn();

  if(selectedTool && hoverPos){
    const def = TOOL_DEFS[selectedTool];
    const ghost = { key:selectedTool, x:hoverPos.x, y:hoverPos.y, radius:def.radius, t, stock:level?level.cartStock:0 };
    ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(hoverPos.x, hoverPos.y, def.radius, def.radius*0.62, 0, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    drawTool(ghost, t, true);
  }

  drawParticles();
}

/* tiny debug handle for automated tests */
window.__bth = {
  state: () => ({ rotors, saved: savedCount, melted: meltedCount, connected: pathConnected(), mode: S.mode, waiting: walkers.filter(w=>w.waiting).length }),
  tap: i => tapRotor(i),
  toScreen(wx, wy){
    const r = canvas.getBoundingClientRect(), s = Math.min(r.width/W, r.height/H);
    return { x: r.left + (r.width - W*s)/2 + wx*s, y: r.top + (r.height - H*s)/2 + wy*s };
  },
};

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;
  update(dt);
  render(now/1000);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
