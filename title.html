<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C9A7E8">
<title>Beat the Heat · the resort 🏝</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:#2b1c2e; }
  body{
    font-family: ui-rounded, "SF Pro Rounded", Quicksand, "Segoe UI", system-ui, sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; color:#5A3A4A;
  }
  #c{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  #lockup{
    position:fixed; left:0; right:0; z-index:5; text-align:center; pointer-events:none;
    top:calc(26px + env(safe-area-inset-top));
  }
  #lockup h1{
    font-size:clamp(34px, 9vw, 64px); line-height:.95; letter-spacing:.02em;
    color:#FFF6E8; text-shadow:0 4px 0 rgba(90,58,74,.35), 0 10px 30px rgba(90,40,70,.35);
  }
  #lockup .tag{
    margin-top:10px; font-weight:800; font-size:clamp(12px,3.4vw,16px);
    color:#5A3A4A; background:rgba(255,246,232,.85); display:inline-block;
    padding:6px 16px; border-radius:999px; box-shadow:0 3px 10px rgba(60,40,70,.2);
  }
  #menu{
    position:fixed; left:0; right:0; z-index:5; display:flex; flex-direction:column;
    align-items:center; gap:12px; bottom:calc(24px + env(safe-area-inset-bottom));
  }
  .play{
    display:block; text-decoration:none; text-align:center; font-weight:800;
    background:#5A3A4A; color:#FFF6E8; border-radius:999px;
    padding:16px 42px; font-size:19px; letter-spacing:.05em; width:min(78vw,320px);
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }
  .play:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.22); }
  .play.alt{ background:rgba(255,246,232,.92); color:#5A3A4A; }
  #menu .tiny{ font-size:11.5px; font-weight:700; color:rgba(90,58,74,.85);
    background:rgba(255,246,232,.7); padding:4px 12px; border-radius:999px;
    max-width:92vw; text-align:center; }
</style>

<body>
<canvas id="c"></canvas>

<div id="lockup">
  <h1>BEAT<br>THE HEAT</h1>
  <div class="tag">104°F, and the dress code survives</div>
</div>
<div id="menu">
  <a class="play" href="index.html">🏙 THE COMMUTE</a>
  <a class="play alt" href="world.html">🌍 TINY WORLD</a>
  <div class="tiny">HOT DESK INC. campus → the skybridge → the Oasis Suite™</div>
</div>

<script>
"use strict";
/* ============================================================
   THE RESORT — Beat the Heat's living title screen.
   The whole island redraws every frame: the sun turns, the
   blimp drifts, the waterfall runs, somebody cannonballs on a
   loop, and the cat has never once been to a stand-up.
   ============================================================ */
const cv = document.getElementById('c'), X = cv.getContext('2d');
let dpr=1, VW=0, VH=0;
function resize(){
  dpr = Math.min(devicePixelRatio||1, 2.5);
  const r = cv.getBoundingClientRect();
  VW = r.width; VH = r.height;
  cv.width = Math.round(VW*dpr); cv.height = Math.round(VH*dpr);
}
addEventListener('resize', resize); resize(); setTimeout(resize, 350);

const TAU = Math.PI*2;
const T = 30, TV = 26;
const P = (x,y,z) => [940 + (x-z)*T, 600 + (x+z)*T*0.5 - y*TV];
let NOW = 0;

function poly(pts, fill, stroke, lw){
  X.beginPath(); X.moveTo(...pts[0]);
  for(let i=1;i<pts.length;i++) X.lineTo(...pts[i]);
  X.closePath();
  if(fill){ X.fillStyle=fill; X.fill(); }
  if(stroke){ X.strokeStyle=stroke; X.lineWidth=lw||1; X.stroke(); }
}
function box(x,z,w,d,y0,h,m,edge){
  const A=P(x,y0+h,z), B=P(x+w,y0+h,z), C=P(x+w,y0+h,z+d), D=P(x,y0+h,z+d);
  const E=P(x+w,y0,z), F=P(x+w,y0,z+d), G=P(x,y0,z+d);
  poly([D,C,F,G], m.left);
  poly([B,C,F,E], m.right);
  poly([A,B,C,D], m.top);
  if(edge){ poly([A,B,C,D], null, edge, 1.2); }
  return {A,B,C,D,E,F,G};
}
const MAT = {
  stone:{ top:'#F2D8B8', left:'#DBA97E', right:'#C08558' },
  walk: { top:'#FDF3DC', left:'#E3BC90', right:'#CB9668' },
  pale: { top:'#F7E4C8', left:'#E0BD95', right:'#C79A6C' },
  brick:{ top:'#E89B82', left:'#C96F5C', right:'#A85546' },
  brick2:{top:'#E8A88F', left:'#D07E68', right:'#B06050' },
  teal: { top:'#BFE3D2', left:'#8FBBA6', right:'#74A18C' },
  lav:  { top:'#CBAED6', left:'#A886BC', right:'#8A6A9E' },
  grass:{ top:'#A7D8A0', left:'#7FB278', right:'#639260' },
  water:{ top:'#7FD1E8', left:'#5FA8A0', right:'#4E938B' },
  deep: { top:'#5FC0DF', left:'#4E9BA0', right:'#3E858B' },
  sand: { top:'#FBE7B8', left:'#E4C288', right:'#CBA468' },
  ice:  { top:'#E8F7FB', left:'#BFE0EC', right:'#A3CCDC' },
};

/* ---------- props ---------- */
function fringe(A2,B2,count,color,depth){
  for(let i=0;i<count;i++){
    const t0=i/count, t1=(i+1)/count, tm=(t0+t1)/2;
    const a=[A2[0]+(B2[0]-A2[0])*t0, A2[1]+(B2[1]-A2[1])*t0];
    const b=[A2[0]+(B2[0]-A2[0])*t1, A2[1]+(B2[1]-A2[1])*t1];
    const m=[A2[0]+(B2[0]-A2[0])*tm, A2[1]+(B2[1]-A2[1])*tm + depth*(.6+((i*73)%7)/9)];
    poly([a,b,m], color);
  }
}
function palmTree(x,z,y0,s=1){
  const [px,py]=P(x,y0,z);
  const sway = Math.sin(NOW*1.1 + x*2 + z)*2*s;
  X.strokeStyle='#B98A5A'; X.lineWidth=5*s; X.lineCap='round';
  X.beginPath(); X.moveTo(px,py); X.quadraticCurveTo(px+6*s,py-26*s,px+2*s+sway,py-46*s); X.stroke();
  X.fillStyle='#6BB08A';
  for(let i=0;i<6;i++){ const a=i/6*TAU;
    X.beginPath();
    X.ellipse(px+2*s+sway+Math.cos(a)*16*s, py-46*s+Math.sin(a)*7*s, 17*s, 6*s, a*.5, 0, TAU); X.fill(); }
  X.fillStyle='#C68B59';
  X.beginPath(); X.arc(px+sway,py-42*s,3.4*s,0,TAU); X.arc(px+6*s+sway,py-44*s,3.4*s,0,TAU); X.fill();
}
function parasol(x,z,y0,c1,c2,s=1){
  const [px,py]=P(x,y0,z);
  const wob = Math.sin(NOW*2 + x)*1.4*s;
  X.strokeStyle='#8A5A45'; X.lineWidth=3.6*s; X.lineCap='round';
  X.beginPath(); X.moveTo(px,py); X.lineTo(px,py-34*s); X.stroke();
  const ty = py-34*s+wob*.3;
  X.fillStyle=c1; X.beginPath(); X.arc(px,ty,22*s,Math.PI,0); X.closePath(); X.fill();
  X.fillStyle=c2;
  X.beginPath(); X.moveTo(px,ty); X.arc(px,ty,22*s,Math.PI+.5,Math.PI+1.1); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(px,ty); X.arc(px,ty,22*s,-.9,-.3); X.closePath(); X.fill();
  X.fillStyle=c1;
  for(let i=0;i<4;i++){ X.beginPath(); X.arc(px-22*s+(i+.5)*11*s, ty, 5.4*s, 0, Math.PI); X.fill(); }
}
function person(x,z,y0,shirt,skin,opts={}){
  const [px,py]=P(x,y0,z); const s=opts.s||1;
  X.save(); X.translate(px,py); if(opts.rot) X.rotate(opts.rot); X.scale(s,s);
  X.fillStyle='rgba(90,50,70,.25)';
  if(!opts.air){ X.beginPath(); X.ellipse(0,2,9,3.4,0,0,TAU); X.fill(); }
  X.strokeStyle='#5A5F73'; X.lineWidth=4; X.lineCap='round';
  const lp=opts.lp==null?3:opts.lp;
  X.beginPath(); X.moveTo(-2.5,-11); X.lineTo(-2.5+lp,0); X.stroke();
  X.beginPath(); X.moveTo(2.5,-11); X.lineTo(2.5-lp,0); X.stroke();
  X.fillStyle=shirt; X.beginPath(); X.roundRect(-7,-25,14,16,4); X.fill();
  X.fillStyle=opts.tie||'#E56F5C';
  X.beginPath(); X.moveTo(0,-24); X.lineTo(2,-19); X.lineTo(0,-13); X.lineTo(-2,-19); X.closePath(); X.fill();
  X.fillStyle=skin; X.beginPath(); X.arc(0,-31,6,0,TAU); X.fill();
  X.fillStyle='#3B2B27'; X.beginPath(); X.arc(0,-33.4,5.2,Math.PI*1.05,Math.PI*1.95); X.fill();
  if(opts.briefcase){ X.fillStyle='#8A5A45'; X.beginPath(); X.roundRect(6,-8,9,7,1.5); X.fill(); }
  if(opts.popsicle){ X.strokeStyle='#C79A6C'; X.lineWidth=2; X.beginPath(); X.moveTo(8,-18); X.lineTo(8,-12); X.stroke();
    X.fillStyle=opts.popsicle; X.beginPath(); X.roundRect(5.4,-27,5.4,10,2.6); X.fill(); }
  X.restore();
}
function swimmer(x,z,y0,skin,ring){
  const [px,py]=P(x,y0,z);
  if(ring){ X.fillStyle=ring; X.beginPath(); X.ellipse(px,py,13,7,0,0,TAU); X.fill();
    X.fillStyle=MAT.water.top; X.beginPath(); X.ellipse(px,py,6,3.2,0,0,TAU); X.fill(); }
  X.fillStyle=skin; X.beginPath(); X.arc(px,py-6,5.4,0,TAU); X.fill();
  X.fillStyle='#3B2B27'; X.beginPath(); X.arc(px,py-8.2,4.6,Math.PI*1.05,Math.PI*1.95); X.fill();
  X.strokeStyle='rgba(255,255,255,.8)'; X.lineWidth=2;
  X.beginPath(); X.moveTo(px-16,py+5); X.quadraticCurveTo(px-8,py+8,px-2,py+5); X.stroke();
}
const WINCACHE = {};
function windows(pts0, w, d, h, key){
  X.fillStyle='rgba(255,225,170,.9)';
  const {B,C,E,F,D,G} = pts0;
  const face = (Ptl,Ptr,Pbr,Pbl,cols,rows,fkey)=>{
    let pat = WINCACHE[fkey];
    if(!pat){ pat = WINCACHE[fkey] = Array.from({length:cols*rows}, ()=>Math.random()>=0.22); }
    for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
      if(!pat[i*rows+j]) continue;
      const u0=(i+.22)/cols, u1=(i+.78)/cols, v0=(j+.2)/rows, v1=(j+.66)/rows;
      const L=(A,B2,t)=>[A[0]+(B2[0]-A[0])*t, A[1]+(B2[1]-A[1])*t];
      const a=L(L(Ptl,Ptr,u0), L(Pbl,Pbr,u0), v0), b=L(L(Ptl,Ptr,u1), L(Pbl,Pbr,u1), v0);
      const c=L(L(Ptl,Ptr,u1), L(Pbl,Pbr,u1), v1), dd=L(L(Ptl,Ptr,u0), L(Pbl,Pbr,u0), v1);
      poly([a,b,c,dd], 'rgba(255,225,170,.9)');
    }
  };
  const rows = Math.max(2, Math.round(h*1.6));
  face(B,C,F,E, Math.max(2,Math.round(d*2)), rows, key+':e');
  face(D,C,F,G, Math.max(2,Math.round(w*2)), rows, key+':s');
}
function acUnit(x,z,y0){
  const [px,py]=P(x,y0,z);
  X.fillStyle='rgba(60,30,50,.15)'; X.beginPath(); X.ellipse(px,py+2,14,5,0,0,TAU); X.fill();
  X.fillStyle='#DDD3EA'; X.beginPath(); X.roundRect(px-12,py-16,24,16,3); X.fill();
  X.strokeStyle='#9C90B4'; X.lineWidth=1.6; X.beginPath(); X.roundRect(px-12,py-16,24,16,3); X.stroke();
  X.beginPath(); X.arc(px-4,py-8,5,0,TAU); X.stroke();
  for(let i=0;i<3;i++){ const a = NOW*5 + (x+z) + i*(TAU/3);
    X.beginPath(); X.moveTo(px-4,py-8);
    X.lineTo(px-4+Math.cos(a)*3.8, py-8+Math.sin(a)*3.8); X.stroke(); }
  for(let i=0;i<3;i++){ X.beginPath(); X.moveTo(px+5,py-13+i*4); X.lineTo(px+10,py-13+i*4); X.stroke(); }
}
function car(x,z,y0,c){
  const A=P(x,y0,z);
  X.save(); X.translate(A[0],A[1]);
  X.fillStyle='rgba(60,30,50,.18)'; X.beginPath(); X.ellipse(0,3,20,6,0,0,TAU); X.fill();
  X.fillStyle=c; X.beginPath(); X.roundRect(-19,-10,38,12,5); X.fill();
  X.beginPath(); X.roundRect(-10,-18,20,10,4); X.fill();
  X.fillStyle='rgba(255,246,232,.85)'; X.beginPath(); X.roundRect(-7,-16,14,7,2.5); X.fill();
  X.fillStyle='#4B3B4E';
  X.beginPath(); X.arc(-11,2,4.6,0,TAU); X.arc(11,2,4.6,0,TAU); X.fill();
  X.restore();
}
function towel(x,z,y0,c1,c2,rot){
  const [px,py]=P(x,y0,z);
  X.save(); X.translate(px,py); X.rotate(rot||-.4);
  X.fillStyle=c1; X.fillRect(-12,-7,24,14);
  X.fillStyle=c2; X.fillRect(-12,-7,24,4);
  X.restore();
}
function cat(x,z,y0){
  const [mx,my]=P(x,y0,z);
  X.fillStyle='#C9B8D8';
  X.beginPath(); X.ellipse(mx-1,my-4,10,6,0,0,TAU); X.fill();
  X.beginPath(); X.arc(mx+9,my-8,5,0,TAU); X.fill();
  X.beginPath(); X.moveTo(mx+5.6,my-11.6); X.lineTo(mx+7,my-16); X.lineTo(mx+9,my-12); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(mx+9.4,my-12.4); X.lineTo(mx+11.6,my-16.2); X.lineTo(mx+12.8,my-11.9); X.closePath(); X.fill();
  const tw = Math.sin(NOW*1.4)*3;
  X.strokeStyle='#C9B8D8'; X.lineWidth=3.2; X.lineCap='round';
  X.beginPath(); X.moveTo(mx-10,my-3); X.quadraticCurveTo(mx-17,my-9+tw,mx-13,my-15+tw); X.stroke();
  const zp = (NOW/2.6)%1;
  if(zp<0.6){
    X.globalAlpha = 1-zp/0.6;
    X.fillStyle='#5A3A4A'; X.font='800 13px ui-rounded, system-ui';
    X.fillText('z', mx+15, my-18-zp*14);
    X.font='800 10px ui-rounded, system-ui';
    X.fillText('z', mx+21, my-26-zp*14);
    X.globalAlpha=1;
  }
}
function flamingo(x,z,y0){
  const [px,py]=P(x,y0,z);
  X.fillStyle='#FF8FAF';
  X.beginPath(); X.ellipse(px,py,16,8,0,0,TAU); X.fill();
  X.fillStyle=MAT.water.top; X.beginPath(); X.ellipse(px,py,7,3.4,0,0,TAU); X.fill();
  X.strokeStyle='#FF8FAF'; X.lineWidth=4; X.lineCap='round';
  X.beginPath(); X.moveTo(px+13,py-2); X.quadraticCurveTo(px+20,py-16,px+13,py-20); X.stroke();
  X.fillStyle='#FF8FAF'; X.beginPath(); X.arc(px+12,py-20,4,0,TAU); X.fill();
  X.fillStyle='#5A3A4A'; X.beginPath(); X.moveTo(px+9,py-20); X.lineTo(px+4,py-18.4); X.lineTo(px+9,py-17.4); X.closePath(); X.fill();
}
function penguin(x,z,y0){
  const [px,py]=P(x,y0,z);
  X.fillStyle='#4B4458';
  X.beginPath(); X.ellipse(px,py-8,7,10,0,0,TAU); X.fill();
  X.fillStyle='#FFF6E8'; X.beginPath(); X.ellipse(px,py-6,4.4,7,0,0,TAU); X.fill();
  X.fillStyle='#FFB25C'; X.beginPath(); X.moveTo(px-2,py-13); X.lineTo(px+4,py-11.6); X.lineTo(px-2,py-10.4); X.closePath(); X.fill();
  X.fillStyle='#2E2837'; X.beginPath(); X.arc(px-2.6,py-15,1.2,0,TAU); X.fill();
}
function crumb(x,z,y0,s, palm){
  box(x,z,s,s,y0,1.1,MAT.stone);
  box(x,z,s,s,y0+1.1,.45,MAT.grass);
  const [gx,gy]=P(x+s/2,y0,z+s/2);
  X.fillStyle=MAT.stone.right;
  X.beginPath(); X.moveTo(gx-14*s,gy); X.lineTo(gx,gy+26*s); X.lineTo(gx+14*s,gy); X.closePath(); X.fill();
  if(palm) palmTree(x+s/2, z+s/2, y0+1.55, .8);
}

/* ---------- viewport-space sky ---------- */
function drawSky(){
  const g = X.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#FFD9B8'); g.addColorStop(.42,'#F2A9A5'); g.addColorStop(.8,'#C9A7E8'); g.addColorStop(1,'#B497DE');
  X.fillStyle=g; X.fillRect(0,0,VW,VH);

  // the antagonist
  const sx0 = Math.min(VW-100, VW*0.86), sy0 = Math.max(120, VH*0.13);
  const sg=X.createRadialGradient(sx0,sy0,10,sx0,sy0,130);
  sg.addColorStop(0,'rgba(255,240,200,.95)'); sg.addColorStop(.4,'rgba(255,215,145,.5)'); sg.addColorStop(1,'rgba(255,215,145,0)');
  X.fillStyle=sg; X.beginPath(); X.arc(sx0,sy0,130,0,TAU); X.fill();
  X.fillStyle='#FFE3A8'; X.beginPath(); X.arc(sx0,sy0,40,0,TAU); X.fill();
  X.strokeStyle='rgba(255,227,168,.8)'; X.lineWidth=4.6; X.lineCap='round';
  for(let i=0;i<10;i++){ const a=i/10*TAU + NOW*0.12;
    const r2 = 66 + Math.sin(NOW*2.4+i)*3;
    X.beginPath(); X.moveTo(sx0+Math.cos(a)*52, sy0+Math.sin(a)*52);
    X.lineTo(sx0+Math.cos(a)*r2, sy0+Math.sin(a)*r2); X.stroke(); }
  X.fillStyle='#5A3A4A';
  X.beginPath(); X.roundRect(sx0-26,sy0-11,21,13,5); X.fill();
  X.beginPath(); X.roundRect(sx0+5,sy0-11,21,13,5); X.fill();
  X.fillRect(sx0-7,sy0-7,14,3.6);
  X.strokeStyle='#5A3A4A'; X.lineWidth=3;
  X.beginPath(); X.moveTo(sx0-9,sy0+14); X.quadraticCurveTo(sx0,sy0+19,sx0+9,sy0+14); X.stroke();

  // clouds
  for(const c of [{f:.06,y:.10,s:1.05,v:9,a:.5},{f:.5,y:.07,s:.75,v:13,a:.4},{f:.75,y:.24,s:.6,v:17,a:.35},{f:.2,y:.3,s:.5,v:11,a:.3}]){
    const cx2 = ((c.f*VW + NOW*c.v) % (VW+260)) - 130, cy2 = VH*c.y;
    X.fillStyle=`rgba(255,255,255,${c.a})`;
    X.beginPath();
    X.arc(cx2,cy2,24*c.s,0,TAU); X.arc(cx2+24*c.s,cy2-9*c.s,18*c.s,0,TAU);
    X.arc(cx2+48*c.s,cy2,20*c.s,0,TAU); X.arc(cx2+24*c.s,cy2+7*c.s,22*c.s,0,TAU);
    X.fill();
  }

  // blimp on patrol
  const bx = ((NOW*26) % (VW+560)) - 280, by = VH*0.16 + Math.sin(NOW*.7)*8;
  X.save(); X.translate(bx,by);
  X.fillStyle='#FF8FAF'; X.beginPath(); X.ellipse(0,0,52,20,0,0,TAU); X.fill();
  X.fillStyle='#E56F92'; X.beginPath(); X.ellipse(0,9,52,9,0,0,Math.PI); X.fill();
  X.fillStyle='#FFD66B'; X.beginPath(); X.moveTo(-52,0); X.lineTo(-68,-11); X.lineTo(-68,11); X.closePath(); X.fill();
  X.fillStyle='#FFF6E8'; X.fillRect(-19,22,42,17);
  X.strokeStyle='#FFF6E8'; X.lineWidth=2;
  X.beginPath(); X.moveTo(-13,14); X.lineTo(-15,22); X.moveTo(16,14); X.lineTo(20,22); X.stroke();
  X.fillStyle='#5A3A4A'; X.font='800 11px system-ui'; X.textAlign='center';
  X.fillText('HYDRATE', 2, 34); X.textAlign='left'; X.restore();

  // birds
  X.strokeStyle='rgba(90,58,74,.5)'; X.lineWidth=2.2; X.lineCap='round';
  for(let i=0;i<3;i++){
    const px2 = ((i*420 + NOW*20) % (VW+180)) - 90;
    const py2 = VH*(.2+.05*i) + Math.sin(NOW*1.2+i*2)*10;
    const fl = Math.sin(NOW*7+i)*3;
    X.beginPath(); X.moveTo(px2-6,py2); X.quadraticCurveTo(px2-3,py2-3-fl,px2,py2);
    X.quadraticCurveTo(px2+3,py2-3-fl,px2+6,py2); X.stroke();
  }
}

/* ---------- the island ---------- */
function drawIsland(){
  // footprint shadow
  X.fillStyle='rgba(90,50,110,.16)';
  X.save(); X.translate(0, 320); X.scale(1,.5);
  X.beginPath();
  X.moveTo(...P(-9,0,2)); X.lineTo(...P(9,0,-8)); X.lineTo(...P(16,0,4)); X.lineTo(...P(2,0,15)); X.closePath();
  X.fill(); X.restore();

  const bob = Math.sin(NOW*.55)*7;
  X.save(); X.translate(0, bob);

  // terraces + crag
  box(-8,-6, 15, 13, -3, 3, MAT.stone);
  box(-1, 2, 16, 12, -4.4, 3.0, MAT.pale);
  box(-8,-6, 15, .8, 0, .35, MAT.grass);
  box(-1, 13.2, 16, .8, -1.4, .35, MAT.grass);
  fringe(P(-8,-3,7),  P(-1,-3,7),  5, MAT.stone.left, 46);
  fringe(P(7,-3,7),   P(7,-3,-6),  8, MAT.stone.right, 40);
  fringe(P(-1,-4.4,14), P(15,-4.4,14), 10, MAT.pale.left, 52);
  fringe(P(15,-4.4,14), P(15,-4.4,2),  8, MAT.pale.right, 44);
  box(-1,2,16,12,-1.4,.3,MAT.sand);

  /* --- office park --- */
  box(-8,-6, 15, 13, 0, .3, MAT.teal);
  box(-7.4,-2.4, 6.4, 6.2, .3, .12, {top:'#D8CBE8',left:'#B6A8CC',right:'#A093BC'});
  X.strokeStyle='rgba(255,246,232,.75)'; X.lineWidth=2;
  for(let i=0;i<5;i++){
    const a=P(-6.6+i*1.15, .45, -2.1), b=P(-6.0+i*1.15, .45, -.9);
    X.beginPath(); X.moveTo(...a); X.lineTo(...b); X.stroke();
  }
  car(-6.1,-1.2,.5,'#8FB8DE'); car(-4.9,-1.5,.5,'#FFD66B'); car(-3.8,-1.8,.5,'#FF8FAF'); car(-2.6,-2.1,.5,'#A7D8C9');
  for(let i=0;i<6;i++) box(-7.6+i*1.05, 4.6, .8,.8, .3,.55, MAT.grass);

  let bpts = box(2.2,-5.2, 3, 3, 0, 7.6, MAT.brick, 'rgba(120,60,50,.25)');
  windows(bpts,3,3,7.6,'hq');
  acUnit(3.2,-4.6,7.6); acUnit(4.4,-3.6,7.6);
  { const [px,py]=P(3.7,7.6,-3.7);
    X.fillStyle='#FFF6E8'; X.beginPath(); X.roundRect(px-58,py-40,116,26,7); X.fill();
    X.strokeStyle='#C96F5C'; X.lineWidth=2.4; X.beginPath(); X.roundRect(px-58,py-40,116,26,7); X.stroke();
    X.strokeStyle='#A85546'; X.lineWidth=2;
    X.beginPath(); X.moveTo(px-40,py-14); X.lineTo(px-40,py); X.moveTo(px+40,py-14); X.lineTo(px+40,py); X.stroke();
    X.fillStyle='#A85546'; X.font='900 15px system-ui'; X.textAlign='center';
    X.fillText('HOT DESK INC.', px, py-21); X.textAlign='left'; }
  bpts = box(-1.6,-4.6, 2.6, 2.6, 0, 5.2, MAT.brick2, 'rgba(120,60,50,.22)');
  windows(bpts,2.6,2.6,5.2,'mid');
  acUnit(-.6,-3.9,5.2);
  bpts = box(-5.4,-5.6, 2.4, 2.2, 0, 3.6, MAT.lav, 'rgba(90,60,110,.2)');
  windows(bpts,2.4,2.2,3.6,'annex');
  acUnit(-4.6,-5,3.6);

  { const [px,py]=P(-1.5,.3,2.5);           // flag, waving
    X.strokeStyle='#8A5A45'; X.lineWidth=3; X.beginPath(); X.moveTo(px,py); X.lineTo(px,py-72); X.stroke();
    const w1=Math.sin(NOW*3)*4, w2=Math.sin(NOW*3+1)*5;
    X.fillStyle='#FF8B7E'; X.beginPath(); X.moveTo(px,py-72);
    X.quadraticCurveTo(px+18,py-70+w1, px+34,py-64+w2); X.lineTo(px,py-56); X.closePath(); X.fill(); }

  palmTree(-6.8,5.6,.85,.9); palmTree(6.4,-5.4,0,1); palmTree(-7.2,2.2,.3,.85);
  cat(-3.2,4.9,.85);
  for(const [fx,fz] of [[0.2,2.9],[1.6,3.5]]){
    box(fx,fz,1.1,.85,.3,.3,{top:'#F4C7D8',left:'#7FB278',right:'#639260'});
    X.fillStyle='#E56F92';
    for(let i=0;i<4;i++){ const [px,py]=P(fx+.2+(i%2)*.6, .65, fz+.2+Math.floor(i/2)*.4);
      X.beginPath(); X.arc(px,py,3,0,TAU); X.fill(); }
  }
  { const [px,py]=P(-.6,.3,5.3);            // sprinkler
    X.strokeStyle='#8A5A45'; X.lineWidth=3; X.lineCap='round';
    X.beginPath(); X.moveTo(px,py); X.lineTo(px,py-13); X.stroke();
    X.strokeStyle=`rgba(170,225,245,${.55+.3*Math.sin(NOW*3)})`; X.lineWidth=2.6;
    for(const s of [-1,1]){
      X.beginPath(); X.moveTo(px,py-13);
      X.quadraticCurveTo(px+22*s,py-30,px+38*s,py-4); X.stroke(); }
    X.fillStyle='rgba(170,225,245,.85)';
    for(let i=0;i<6;i++){ const ph=(NOW*1.7+i/6)%1;
      X.beginPath(); X.arc(px-34+i*13, py-16+ph*16, 2,0,TAU); X.fill(); } }
  person(2.6,-.7,.3,'#8FB8DE','#F6C9A0',{briefcase:true});
  person(3.3,.1,.3,'#E7C6E0','#C68B59',{briefcase:true,lp:-3});
  person(3.9,-1.3,.3,'#F0E2B6','#E8B48A',{tie:'#D4AF37'});

  /* --- skybridge --- */
  box(4.35,-.5,.95,.8,.3,.55,MAT.walk);
  box(4.5,-.05,.9,.7,.3,1.15,MAT.walk);
  person(4.8,.25,1.45,'#A7D8C9','#8D5A3A',{briefcase:true,lp:-2});
  for(const [bx,bz] of [[4.6,.5],[5.5,1.3],[6.4,2.1],[7.4,2.7],[8.4,3.3]]){
    box(bx,bz,.96,.96, 1.5, .5, MAT.walk, 'rgba(150,100,70,.25)');
    box(bx+.32,bz+.32,.32,.32, -1.4, 2.9, MAT.stone);
  }
  box(9.3,3.4,.9,.8,-1.1,2.6,MAT.walk);
  box(10.1,3.7,.8,.7,-1.1,1.9,MAT.walk);
  box(10.8,4.0,.7,.6,-1.1,1.2,MAT.walk);
  const wp = (NOW*.08)%1; // one commuter actually walks the bridge
  { const path=[[4.6,.5],[5.5,1.3],[6.4,2.1],[7.4,2.7],[8.4,3.3]];
    const f = wp*(path.length-1), i0=Math.min(path.length-2, Math.floor(f)), u=f-i0;
    const wx = path[i0][0]+(path[i0+1][0]-path[i0][0])*u + .45;
    const wz = path[i0][1]+(path[i0+1][1]-path[i0][1])*u + .45;
    person(wx,wz,2,'#8FB8DE','#8D5A3A',{briefcase:true,lp:Math.sin(NOW*9)*4}); }
  person(5.15,1.0,2,'#A7D8C9','#F6C9A0',{briefcase:true});
  person(7.15,2.6,2,'#E7C6E0','#E8B48A',{popsicle:'#FF8FAF'});
  person(8.55,3.6,2,'#F0E2B6','#C68B59',{briefcase:true,lp:-2});
  person(10.5,4.05,.8,'#FFD66B','#F6C9A0',{lp:2});
  parasol(7.0,2.35,2,'#FF8B7E','#FFD3B8',.85);

  /* --- oasis suite --- */
  const OG=-1.4;
  // grand pool
  box(3.6,6.2, 5.4, 4.2, OG+.3, .5, MAT.walk);
  box(4.0,6.6, 4.6, 3.4, OG+.55, .3, MAT.water);
  X.strokeStyle='rgba(255,255,255,.65)'; X.lineWidth=2;
  for(let i=0;i<7;i++){
    const ph = Math.sin(NOW*1.6+i)*3;
    const a=P(4.6+((i*1.3)%4), OG+.9, 7+((i*.9)%2.6));
    X.beginPath(); X.moveTo(a[0]-8,a[1]+ph*.3); X.quadraticCurveTo(a[0],a[1]+3+ph*.3,a[0]+8,a[1]+ph*.3); X.stroke(); }
  { const [px,py]=P(4.0,OG+.85,6.4);        // diving board
    X.fillStyle='#F2F2F7'; X.fillRect(px-6,py-30,10,44);
    X.fillStyle='#FFD66B'; X.beginPath(); X.roundRect(px-8,py-34,36,7,3); X.fill(); }
  { const cyc=(NOW/4.2)%1;                   // the eternal cannonball
    if(cyc<.3){
      person(4.35,6.85,OG+1.62,'#FF8B7E','#F6C9A0',{lp:0, rot:Math.sin(NOW*8)*.04});
    } else if(cyc<.62){
      const u=(cyc-.3)/.32;
      const x=4.35+(5.7-4.35)*u, z=6.85+(7.7-6.85)*u;
      const y=OG+1.62 + Math.sin(u*Math.PI)*2.1 - u*.9;
      person(x,z,y,'#FF8B7E','#F6C9A0',{air:true, rot:u*2.4, lp:6});
    } else {
      const u=(cyc-.62)/.38; const [px,py]=P(5.7,OG+.85,7.7);
      X.strokeStyle=`rgba(255,255,255,${(1-u)*.9})`; X.lineWidth=3;
      X.beginPath(); X.ellipse(px,py,8+u*30,(8+u*30)*.45,0,0,TAU); X.stroke();
      if(u<.35){ X.lineCap='round';
        for(let i=0;i<5;i++){ const a=-.4-i*.55;
          X.beginPath(); X.moveTo(px,py);
          X.lineTo(px+Math.cos(a)*16*(1-u*2), py+Math.sin(a)*16*(1-u*2)); X.stroke(); } }
    } }
  swimmer(7.4+Math.sin(NOW*.5)*.15, 8.4, OG+.9,'#E8B48A','#FF8FAF');
  swimmer(5.2,9.2+Math.sin(NOW*.4)*.12, OG+.9,'#8D5A3A',null);
  flamingo(7.9+Math.sin(NOW*.33)*.25, 9.3+Math.cos(NOW*.27)*.2, OG+.9);
  { const [px,py]=P(8.6,OG+.9,8.2);          // ladder
    X.strokeStyle='#F2F2F7'; X.lineWidth=2.6; X.lineCap='round';
    X.beginPath(); X.moveTo(px,py-14); X.lineTo(px,py+2); X.moveTo(px+6,py-16); X.lineTo(px+6,py);
    X.moveTo(px,py-10); X.lineTo(px+6,py-12); X.moveTo(px,py-4); X.lineTo(px+6,py-6); X.stroke(); }
  towel(3.2,10.9,OG+.3,'#FFD66B','#FF8B7E',-.4); towel(4.3,11.4,OG+.3,'#A7D8C9','#5FA8A0',.3);
  parasol(2.9,10.2,OG+.3,'#FF8B7E','#FFD3B8',1.05);

  // waterfall grotto
  box(11.6,2.6, 3, 2.6, OG+.3, 2.6, MAT.stone);
  box(11.9,2.9, 2.4, 2, OG+2.9, .3, MAT.deep);
  palmTree(14.1,2.9,OG+3.2,.95);
  box(10.6,5.6, 4.4, 3, OG+.3, .4, MAT.walk);
  box(11,6, 3.6, 2.2, OG+.5, .3, MAT.deep);
  { const a=P(12.7,OG+3.1,4.6), b=P(14.4,OG+.9,6.3); // screen-vertical drop lands where x−z holds
    const wg=X.createLinearGradient(0,a[1],0,b[1]);
    wg.addColorStop(0,'rgba(191,233,247,.95)'); wg.addColorStop(1,'rgba(191,233,247,.35)');
    X.fillStyle=wg; X.beginPath(); X.roundRect(a[0]-13,a[1],26,b[1]-a[1],8); X.fill();
    X.strokeStyle='rgba(255,255,255,.8)'; X.lineWidth=2.4;
    for(let i=0;i<4;i++){ const ph=(NOW*1.4+i/4)%1;
      const yy = a[1] + ph*(b[1]-a[1]-14);
      X.beginPath(); X.moveTo(a[0]-8+i*5.5, yy); X.lineTo(a[0]-8+i*5.5, yy+13); X.stroke(); }
    X.fillStyle='rgba(255,255,255,.5)';
    for(let i=0;i<6;i++){ const r2=4.6+Math.sin(NOW*2.6+i)*1.4;
      X.beginPath(); X.arc(a[0]-18+i*8, b[1]-2+(i%2)*5, r2,0,TAU); X.fill(); }
    X.lineWidth=4;
    const rcs=['rgba(255,139,126,.55)','rgba(255,214,107,.55)','rgba(155,199,222,.55)'];
    for(let i=0;i<3;i++){ X.strokeStyle=rcs[i];
      X.beginPath(); X.arc(a[0], b[1]-4, 30+i*6, Math.PI, TAU); X.stroke(); } }
  swimmer(12.4,6.9,OG+.9,'#F6C9A0',null);

  // hammock glade
  palmTree(.2,5.2,OG+.3,.9); palmTree(1.9,6.1,OG+.3,.9);
  { const a=P(.2,OG+1.5,5.2), b=P(1.9,OG+1.5,6.1);
    X.strokeStyle='#E5A86B'; X.lineWidth=4; X.lineCap='round';
    const sag = 16 + Math.sin(NOW*1.6)*2;
    X.beginPath(); X.moveTo(a[0],a[1]-12); X.quadraticCurveTo((a[0]+b[0])/2,(a[1]+b[1])/2+sag,b[0],b[1]-12); X.stroke();
    const hx=(a[0]+b[0])/2, hy=(a[1]+b[1])/2+sag*.5;
    X.fillStyle='#F0E2B6'; X.beginPath(); X.ellipse(hx,hy,14,6,-.15,0,TAU); X.fill();
    X.fillStyle='#F6C9A0'; X.beginPath(); X.arc(hx+13,hy-4,4.6,0,TAU); X.fill();
    X.fillStyle='#3B2B27'; X.beginPath(); X.arc(hx+13,hy-6.4,4,Math.PI,TAU); X.fill(); }

  // lazy river
  box(-.4,6.8, 3.6, 3.6, OG+.3, .35, MAT.water);
  box(.6,7.8, 1.6, 1.6, OG+.62, .5, MAT.sand);
  palmTree(1.4,8.6,OG+1.1,1.05);
  for(const [off,skin,ring] of [[0,'#C68B59','#FFD66B'],[2.7,'#F6C9A0','#A7D8C9']]){
    const a=NOW*.35+off;
    swimmer(1.4+Math.cos(a)*1.35, 8.6+Math.sin(a)*1.35, OG+.72, skin, ring);
  }
  X.strokeStyle='rgba(255,255,255,.55)'; X.lineWidth=2.2;
  for(const [wx,wz] of [[-.1,7.6],[2.8,7.4],[.4,10],[2.9,9.9]]){
    const [rx,ry]=P(wx,OG+.68,wz);
    const ph=Math.sin(NOW*2+wx*3)*2;
    X.beginPath(); X.moveTo(rx-9,ry+ph*.2); X.quadraticCurveTo(rx,ry+4+ph*.2,rx+9,ry+ph*.2); X.stroke();
  }

  // tiki bar
  box(9.8,9.6, 2.6, 2.2, OG+.3, .9, {top:'#E4C288',left:'#C79A6C',right:'#B0854F'});
  { const [px,py]=P(11.1,OG+1.2,10.7);
    X.strokeStyle='#8A5A45'; X.lineWidth=3.4;
    X.beginPath(); X.moveTo(px-30,py+4); X.lineTo(px-30,py-34); X.moveTo(px+30,py+4); X.lineTo(px+30,py-34); X.stroke();
    X.fillStyle='#D8B36A';
    X.beginPath(); X.moveTo(px-44,py-30); X.lineTo(px,py-52); X.lineTo(px+44,py-30); X.closePath(); X.fill();
    X.strokeStyle='#B9924E'; X.lineWidth=2;
    for(let i=0;i<5;i++){ X.beginPath(); X.moveTo(px-38+i*19,py-31); X.lineTo(px-20+i*11,py-46); X.stroke(); }
    for(const [dx,c] of [[-16,'#FF8FAF'],[0,'#FFD66B'],[16,'#A7D8C9']]){
      X.fillStyle=c; X.beginPath(); X.roundRect(px+dx-4,py-14,8,11,2); X.fill();
      X.strokeStyle='#5A3A4A'; X.lineWidth=1.4; X.beginPath(); X.moveTo(px+dx+2,py-14); X.lineTo(px+dx+6,py-20); X.stroke(); } }
  person(9.6,11.6,OG+.3,'#A7D8C9','#E8B48A',{popsicle:'#FFD66B'});

  // cold plunge
  box(-0.2,11.4, 2, 1.8, OG+.3, .6, MAT.ice);
  box(.1,11.7, 1.4, 1.2, OG+.7, .25, {top:'#BDE9F6',left:'#94CBDD',right:'#7FB7CB'});
  penguin(1.5,11.9,OG+1);
  { const [px,py]=P(.5,OG+.98,12.2);
    const ph=Math.sin(NOW*1.8)*1.5;
    X.fillStyle='rgba(255,255,255,.85)';
    X.fillRect(px-4,py-4+ph*.4,8,7); X.fillRect(px+9,py-1-ph*.4,6,5); }

  // paletas cart
  { const [px,py]=P(8.9,OG+.3,11.9);
    X.fillStyle='rgba(60,30,50,.16)'; X.beginPath(); X.ellipse(px,py+4,22,6,0,0,TAU); X.fill();
    X.fillStyle='#FFF6E8'; X.beginPath(); X.roundRect(px-18,py-22,36,22,4); X.fill();
    X.fillStyle='#FF8B7E'; X.fillRect(px-18,py-22,36,6);
    X.fillStyle='#5A3A4A'; X.font='900 8px system-ui'; X.textAlign='center'; X.fillText('PALETAS', px, py-9); X.textAlign='left';
    X.fillStyle='#4B3B4E'; X.beginPath(); X.arc(px-9,py+3,4.6,0,TAU); X.arc(px+9,py+3,4.6,0,TAU); X.fill();
    X.strokeStyle='#C79A6C'; X.lineWidth=2.4; X.beginPath(); X.moveTo(px+18,py-18); X.lineTo(px+30,py-24); X.stroke();
    parasol(9.7,11.5,OG+1.15,'#FFD66B','#FFF6E8',.85); }

  // deck life
  towel(13.9,8.9,OG+.3,'#E7C6E0','#A886BC',.5);
  person(14.2,9.8,OG+.3,'#FFD66B','#F6C9A0',{lp:0});
  towel(1.5,12.7,OG+.3,'#8FB8DE','#5A7FA8',.25);
  person(2.7,12.1,OG+.3,'#FF8FAF','#E8B48A',{popsicle:'#A7D8C9',lp:1});
  parasol(1.0,13.1,OG+.3,'#A7D8C9','#FFF6E8',.95);
  { const [px,py]=P(3.3,OG+.3,4.5);          // beach ball
    const cols=['#FF8B7E','#FFF6E8','#8FB8DE','#FFD66B'];
    for(let i=0;i<4;i++){ X.fillStyle=cols[i];
      X.beginPath(); X.moveTo(px,py-7); X.arc(px,py-7,8.5,i*Math.PI/2+.6+NOW*.4,(i+1)*Math.PI/2+.6+NOW*.4); X.closePath(); X.fill(); }
    X.fillStyle='rgba(255,255,255,.9)'; X.beginPath(); X.arc(px-2.6,py-10,2.2,0,TAU); X.fill(); }

  X.restore(); // island bob

  // floating crumbs, each on its own gentle current
  for(const [cx2,cz2,cy2,cs,palm,ph] of [[-11.5,-1.5,-1.2,1.5,true,0],[16.5,7.5,-2.2,1.2,true,2],[13.5,-4.5,3.4,1,false,4]]){
    X.save(); X.translate(0, Math.sin(NOW*.5+ph)*9);
    crumb(cx2,cz2,cy2,cs,palm);
    X.restore();
  }
}

let last = performance.now();
function frame(now){
  NOW = now/1000;
  X.setTransform(dpr,0,0,dpr,0,0);
  drawSky();
  const s = Math.min(VW/1120, VH/1320);
  X.save();
  X.translate(VW/2 - 965*s, VH*0.46 - 600*s);
  X.scale(s,s);
  drawIsland();
  X.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
