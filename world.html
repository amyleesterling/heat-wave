<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C9A7E8">
<title>Beat the Heat · Tiny World 🌍</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:#2b1c2e; }
  body{
    font-family: ui-rounded, "SF Pro Rounded", Quicksand, "Segoe UI", system-ui, sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; color:#5A3A4A;
  }
  #c{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hidden{ display:none !important; }
  #hud{
    position:fixed; top:0; left:0; right:0; z-index:5; pointer-events:none;
    display:flex; justify-content:space-between; align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 14px 0;
  }
  .chip{
    background:rgba(255,246,232,.9); border-radius:16px; padding:7px 13px;
    font-weight:800; font-size:14px; box-shadow:0 3px 10px rgba(60,40,70,.25);
    pointer-events:auto;
  }
  a.chip{ text-decoration:none; color:#5A3A4A; }
  #status{
    position:fixed; left:50%; transform:translateX(-50%); z-index:5;
    top:calc(62px + env(safe-area-inset-top)); pointer-events:none;
    background:rgba(90,58,74,.85); color:#FFF6E8; font-size:13.5px; font-weight:700;
    padding:8px 18px; border-radius:999px; text-align:center; max-width:86vw;
    transition:opacity .3s;
  }
  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    background:#5A3A4A; color:#FFF6E8; border-radius:999px;
    padding:15px 36px; font-size:18px; letter-spacing:.05em;
    box-shadow:0 6px 0 rgba(0,0,0,.22); transition:transform .08s;
    position:fixed; left:50%; transform:translateX(-50%); z-index:6;
    bottom:calc(20px + env(safe-area-inset-bottom));
  }
  .btn:active{ transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.22); }
  .btn:disabled{ background:rgba(90,58,74,.45); cursor:default; box-shadow:0 3px 0 rgba(0,0,0,.12); }
  #modal{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:rgba(58,32,52,.45); backdrop-filter:blur(3px);
  }
  #modal .card{
    background:#FFF6E8; border-radius:26px; padding:26px 24px 22px; width:min(86vw,340px);
    text-align:center; box-shadow:0 14px 40px rgba(40,20,40,.35);
  }
  #modal h2{ font-size:26px; margin:4px 0 10px; }
  #modal p{ font-size:14.5px; line-height:1.5; opacity:.85; margin-bottom:16px; }
  #modal .kicker{ font-size:11px; font-weight:800; letter-spacing:.22em; color:#FF7B6B; text-transform:uppercase; }
  #modal button{ position:static; transform:none; }
  #modal button:active{ transform:translateY(4px); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <a class="chip" href="index.html">← the commute</a>
  <div class="chip">⛱ <b id="paras">2</b> &nbsp; 🧊 <b id="saved">0</b>/<b id="quota">3</b> &nbsp; 🫠 <b id="melted">0</b></div>
</div>
<div id="status">spin the world 🌍</div>
<button class="btn" id="goBtn" disabled>🧩 FIND THE WAY</button>

<div id="modal">
  <div class="card">
    <div class="kicker" id="mKicker">Tiny World № 1</div>
    <h2 id="mName">The Liquid Oasis</h2>
    <p id="mBlurb"></p>
    <button class="btn" id="startBtn">SPIN IT</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   TINY WORLD — rotatable Escher-in-pastel dioramas.
   Orthographic block worlds; drag to orbit with 90° snaps.
   Walkability is computed from SCREEN adjacency after projection
   (the Fez/Monument Valley trick). From world № 2 on, no single
   view connects door to pool: rotate MID-WALK to open new seams
   while the queue cooks.
   ============================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr=1, CW=0, CH=0;
function resize(){
  dpr = Math.min(devicePixelRatio||1, 2.5);
  const r = canvas.getBoundingClientRect();
  CW = r.width; CH = r.height;
  canvas.width = Math.round(CW*dpr); canvas.height = Math.round(CH*dpr);
}
addEventListener('resize', resize); resize(); setTimeout(resize, 350);

const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);

/* ---------- tiny synth ---------- */
let AC=null;
function tone(f,d,type='sine',v=.14,slide=null,when=0){
  try{ AC = AC || new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  if(AC.state==='suspended') AC.resume();
  const t0=AC.currentTime+when, o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide,1),t0+d);
  g.gain.setValueAtTime(v,t0); g.gain.exponentialRampToValueAtTime(.0001,t0+d);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+d+.05);
}
const sfx = {
  snap(){ tone(300,.09,'triangle',.16); tone(450,.12,'triangle',.10,null,.05); },
  connect(){ [523,659,784].forEach((f,i)=>tone(f,.18,'sine',.12,null,i*.09)); },
  fan(){ tone(1200,.06,'triangle',.05,700); },
  save(){ tone(320,.1,'sine',.16,120); tone(660,.14,'sine',.11,null,.08); tone(880,.16,'sine',.1,null,.16); },
  melt(){ tone(280,.5,'sawtooth',.09,60); },
  win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.2,'sine',.13,null,i*.1)); },
};

/* ============================================================
   WORLDS — each is a builder plus tuning. All share the same
   world centre (3.5, 2.5) so the projection math holds.
   ============================================================ */
let B = [], TOPS = [], occupiedSet = new Set(), DOOR = null, POOLS = [];
const add = (x,y,z,m)=>B.push({x,y,z,m});
const col = (x,z,h,m='stone')=>{ for(let y=0;y<h;y++) add(x,y,z,m); };

const WORLDS = [
  { name:'The Liquid Oasis', gated:true, count:5, quota:3, heat:13, parasols:2,
    blurb:'<b>Drag to spin the world.</b> The path from the office door to the rooftop pool is broken… from most angles. Find the view where the walkways <i>agree</i>, then open the doors. <b>Tap a tile to plant a parasol ⛱ · tap a climber to fan 🌬.</b>',
    build(){
      col(0,4,3,'office'); col(0,3,3,'office'); col(0,5,2,'office');
      for(let x=1;x<=4;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
      for(let x=2;x<=5;x++){ col(x,0,3,'stone'); add(x,3,0,'walk'); }
      col(5,1,3,'stone'); add(5,3,1,'walk');
      col(5,2,3,'stone'); add(5,3,2,'walk');
      col(6,0,3,'stone'); col(6,1,3,'stone');
      add(6,3,0,'pool'); add(6,3,1,'pool');
      col(7,0,3,'stone'); col(7,1,3,'stone');
      add(7,3,0,'pool'); add(7,3,1,'pool');
      col(6,4,1,'accent'); add(6,1,4,'garden');
      col(2,2,2,'accent'); add(2,2,2,'garden');
      col(7,2,3,'accent'); add(7,3,2,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:6,y:3,z:0},{x:6,y:3,z:1},{x:7,y:3,z:0},{x:7,y:3,z:1}] };
    } },
  { name:'The Rooftop Was Upstairs', gated:false, count:5, quota:3, heat:4.5, parasols:2,
    blurb:'No single view connects the door to the pool. <b>Open the doors anyway</b> — walk them across the first seam, then <b>spin the world while they wait</b> to open the next. They keep cooking while you turn. The pool, it turns out, was on the office roof all along.',
    build(){
      // office tower — the pool deck will sit on its roof
      col(0,3,3,'office'); col(0,4,3,'office'); col(0,5,3,'office');
      // door deck A: z=4, tops at surf 2
      for(let x=1;x<=3;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
      // floating middle deck B: (2..4, 3, 2) on one slim column
      col(3,2,3,'stone');
      for(let x=2;x<=4;x++) add(x,3,2,'walk');
      // pool deck C on the office roof: (0, 3, 3..5)
      add(0,3,3,'walk'); add(0,3,4,'pool'); add(0,3,5,'pool');
      // dressing
      col(6,1,2,'accent'); add(6,2,1,'garden');
      col(7,4,1,'accent'); add(7,1,4,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:0,y:3,z:4},{x:0,y:3,z:5}] };
    } },
  { name:'The Long Way Around', gated:false, count:6, quota:4, heat:5.5, parasols:1,
    blurb:'Two seams, two different faces of the world, one parasol, and a hotter sun. Stage the crowd on the floating deck, spin, and pray. HR calls this <i>a growth opportunity</i>.',
    build(){
      col(0,3,3,'office'); col(0,4,3,'office'); col(0,5,2,'office');
      // door deck A: z=4
      for(let x=1;x<=3;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
      // floating deck B: (1..3, 3, 5) — behind and above the door deck
      col(2,5,3,'stone');
      for(let x=1;x<=3;x++) add(x,3,5,'walk');
      // pool deck C: (5..7, 3, 5)
      col(6,5,3,'stone');
      add(5,3,5,'walk'); add(6,3,5,'pool'); add(7,3,5,'pool');
      // dressing
      col(5,1,2,'accent'); add(5,2,1,'garden');
      col(7,0,1,'accent'); add(7,1,0,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:6,y:3,z:5},{x:7,y:3,z:5}] };
    } },
];
let wi = 0;

/* ---------- projection ---------- */
const TILE = 34, HGT = 34*0.5;
let yaw = 0, yawTarget = 0, dragging=false, spun=false;

function project(x,y,z,cy=yaw){
  const dx = x-3.5, dz = z-2.5;
  const rx = dx*Math.cos(cy) - dz*Math.sin(cy);
  const rz = dx*Math.sin(cy) + dz*Math.cos(cy);
  return {
    sx: (rx - rz) * TILE,
    sy: (rx + rz) * TILE*0.5 - y*HGT,
    depth: rx + rz + y*0.001,
  };
}
const SNAPS = [0,1,2,3].map(k=>k*Math.PI/2);
const snapIndex = a => {
  let best=0, bd=1e9;
  for(let i=0;i<4;i++){ const d=Math.abs(Math.atan2(Math.sin(a-SNAPS[i]),Math.cos(a-SNAPS[i]))); if(d<bd){bd=d;best=i;} }
  return best;
};
const settled = () => !dragging && Math.abs(yaw - yawTarget) < 0.03;

/* ---------- screen-space walk graph (the Escher rule) ---------- */
const keyOf = t => `${t.x},${t.y},${t.z}`;
function graphAt(idx){
  const a = SNAPS[idx];
  const cells = new Map();
  for(const t of TOPS){
    const p = project(t.x, t.y+1, t.z, a);
    const u = Math.round(p.sx / TILE), v = Math.round(p.sy / (TILE*0.5));
    const k = u+','+v;
    const prev = cells.get(k);
    if(!prev || p.depth > prev.depth) cells.set(k, {t, u, v, depth:p.depth});
  }
  const nodes = [...cells.values()];
  const byUV = new Map(nodes.map(n=>[n.u+','+n.v, n]));
  const edges = new Map(nodes.map(n=>[keyOf(n.t), []]));
  for(const n of nodes){
    for(const [du,dv] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
      const m = byUV.get((n.u+du)+','+(n.v+dv));
      if(m) edges.get(keyOf(n.t)).push(m.t);
    }
  }
  return { edges, visible:new Set(nodes.map(n=>keyOf(n.t))) };
}
let G = null;        // graph at the current snapped view
let POT = new Map(); // per-tile hop distance to a pool over the UNION of all
                     // four views' graphs — "how far from winning, counting
                     // future rotations". Escher-safe, unlike world distance.
function buildPotential(){
  const union = new Map(TOPS.map(t=>[keyOf(t), new Set()]));
  for(let v=0; v<4; v++){
    const g = graphAt(v);
    for(const [k, es] of g.edges) for(const nb of es) union.get(k).add(keyOf(nb));
  }
  POT = new Map();
  const q = [];
  for(const p of POOLS){ POT.set(keyOf(p), 0); q.push(keyOf(p)); }
  while(q.length){
    const k = q.shift(), d = POT.get(k);
    for(const [k2, es] of union)
      if(!POT.has(k2) && es.has(k)){ POT.set(k2, d+1); q.push(k2); }
  }
}
function routeFrom(tile, allowFrontier=false){
  if(!G || !G.visible.has(keyOf(tile))) return null;
  const goal = new Set(POOLS.map(keyOf));
  const q=[tile], prev=new Map([[keyOf(tile),null]]);
  const order=[tile];
  while(q.length){
    const cur=q.shift();
    if(goal.has(keyOf(cur))){
      const path=[cur]; let k=prev.get(keyOf(cur));
      while(k){ path.unshift(k); k=prev.get(keyOf(k)); }
      return path;
    }
    for(const nb of (G.edges.get(keyOf(cur))||[])){
      if(prev.has(keyOf(nb))) continue;
      prev.set(keyOf(nb), cur); q.push(nb); order.push(nb);
    }
  }
  if(!allowFrontier) return null;
  // no full route in this view — advance to the reachable tile with the best
  // potential, staging the crowd at the broken seam for the next rotation
  const pot = t => POT.has(keyOf(t)) ? POT.get(keyOf(t)) : Infinity;
  let best=null, bd=pot(tile) - 0.5; // only move if strictly better
  for(const t of order){
    const d = pot(t);
    if(d < bd){ bd=d; best=t; }
  }
  if(!best) return null;
  const path=[best]; let k=prev.get(keyOf(best));
  while(k){ path.unshift(k); k=prev.get(keyOf(k)); }
  return path.length>1 ? path : null;
}

/* ---------- state ---------- */
const $ = s=>document.querySelector(s);
const el = { saved:$('#saved'), paras:$('#paras'), melted:$('#melted'), quota:$('#quota'), status:$('#status'),
             goBtn:$('#goBtn'), modal:$('#modal'), startBtn:$('#startBtn'),
             mKicker:$('#mKicker'), mName:$('#mName'), mBlurb:$('#mBlurb') };
let mode='spin';            // spin | walk | done
let walkers=[], savedCount=0, meltedCount=0, spawnT=0, spawnedN=0, particles=[], parasols=[];
let W = WORLDS[0];

function loadWorld(i){
  wi = clamp(i, 0, WORLDS.length-1);
  W = WORLDS[wi];
  B = [];
  const r = W.build.call(null);
  DOOR = r.door; POOLS = r.pools;
  occupiedSet = new Set(B.map(keyOf));
  TOPS = B.filter(b => (b.m==='walk'||b.m==='pool') && !occupiedSet.has(`${b.x},${b.y+1},${b.z}`));
  buildPotential();
  walkers=[]; parasols=[]; particles=[];
  savedCount=0; meltedCount=0; spawnT=0; spawnedN=0;
  mode='spin'; yaw=0; yawTarget=0; spun=false; G=null;
  el.saved.textContent=0; el.melted.textContent=0;
  el.quota.textContent=W.quota; el.paras.textContent=W.parasols;
  el.mKicker.textContent = `Tiny World № ${wi+1} of ${WORLDS.length}`;
  el.mName.textContent = W.name;
  el.mBlurb.innerHTML = W.blurb;
  el.modal.classList.remove('hidden');
  el.goBtn.classList.remove('hidden');
  el.goBtn.onclick = openDoors;
  localStorage.setItem('btw_world', String(wi));
  refreshGate();
}

function setStatus(msg){ el.status.textContent = msg; }
function refreshGate(){
  if(mode!=='spin') return;
  G = graphAt(snapIndex(yawTarget));
  const full = routeFrom(DOOR);
  if(W.gated){
    el.goBtn.disabled = !full;
    el.goBtn.textContent = full ? '🚪 OPEN THE DOORS' : '🧩 FIND THE WAY';
    setStatus(full ? 'the walkways agree ✨' : (spun ? 'not from this angle…' : 'spin the world 🌍'));
  } else {
    el.goBtn.disabled = false;
    el.goBtn.textContent = '🚪 OPEN THE DOORS';
    setStatus(full ? 'the walkways agree ✨' : 'no through-path… you’ll rotate mid-walk 🌀');
  }
}
function openDoors(){
  if(mode!=='spin' || el.goBtn.disabled) return;
  mode='walk';
  el.goBtn.classList.add('hidden');
  G = graphAt(snapIndex(yawTarget));
  setStatus(W.gated ? 'tap tiles to plant ⛱ · tap climbers to fan 🌬'
                    : 'walk them to the seam, then SPIN 🌀 (they keep cooking)');
  sfx.connect();
}
function finishWorld(){
  mode='done';
  const win = savedCount >= W.quota;
  if(win){
    sfx.win();
    const last = wi === WORLDS.length-1;
    setStatus(last ? `☀️ ${savedCount}/${W.count} — all ${WORLDS.length} tiny worlds conquered!`
                   : `☀️ ${savedCount}/${W.count} reached the water!`);
    el.goBtn.textContent = last ? '↻ FROM THE TOP' : '🌍 NEXT WORLD';
    el.goBtn.disabled = false;
    el.goBtn.classList.remove('hidden');
    el.goBtn.onclick = ()=>loadWorld(last ? 0 : wi+1);
  } else {
    setStatus('🫠 the oasis remains theoretical…');
    el.goBtn.textContent = '↻ SPIN AGAIN';
    el.goBtn.disabled = false;
    el.goBtn.classList.remove('hidden');
    el.goBtn.onclick = ()=>loadWorld(wi);
  }
}

el.startBtn.addEventListener('click', ()=>{ el.modal.classList.add('hidden'); tone(500,.1,'triangle',.12); });

/* ---------- input: drag to orbit, tap to fan / plant ---------- */
let px0=0, py0=0, yaw0=0, moved=0;
canvas.addEventListener('pointerdown', e=>{
  dragging=true; moved=0; px0=e.clientX; py0=e.clientY; yaw0=yaw;
});
canvas.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dx = e.clientX-px0;
  moved = Math.max(moved, Math.abs(dx), Math.abs(e.clientY-py0));
  yaw = yaw0 + dx*0.012;
  spun = spun || moved>30;
});
addEventListener('pointerup', e=>{
  if(!dragging) return;
  dragging=false;
  if(moved < 8){ tapAt(e.clientX, e.clientY); }
  const idx = snapIndex(yaw);
  yawTarget = SNAPS[idx] + Math.round((yaw - SNAPS[idx])/TAU)*TAU;
  sfx.snap();
  if(mode==='spin') refreshGate();
  else if(mode==='walk'){ G = graphAt(idx); }
});

function tapAt(cx, cy){
  if(mode!=='walk' && mode!=='spin') return;
  const wx = (cx - CW/2), wy = (cy - CH*0.46);
  if(mode==='walk' && fanAt(wx, wy)) return;
  plantParasol(wx, wy);
}
function fanAt(wx, wy){
  let best=null, bd=42*42;
  for(const w of walkers){
    const p = walkerScreen(w);
    const d2 = (p.sx-wx)**2 + (p.sy-18-wy)**2;
    if(d2<bd){ bd=d2; best=w; }
  }
  if(best && best.fanCd<=0){
    best.heat = Math.max(0, best.heat-16);
    best.fanCd = 1.0;
    sfx.fan();
    const p = walkerScreen(best);
    for(let i=0;i<8;i++){ const a=i/8*TAU;
      particles.push({sx:p.sx+Math.cos(a)*12, sy:p.sy-16+Math.sin(a)*8, vx:Math.cos(a+1.6)*50, vy:Math.sin(a+1.6)*34-10, life:.5, max:.5, color:'#DFF3FF', size:2.6});
    }
    return true;
  }
  return false;
}
function plantParasol(wx, wy){
  if(parasols.length >= W.parasols) return;
  let bt=null, bd=26*26;
  for(const t of TOPS){
    if(t.m!=='walk') continue;
    if(parasols.some(p=>p.t===t)) continue;
    const p = project(t.x, t.y+1, t.z);
    const d2 = (p.sx-wx)**2 + (p.sy-wy)**2;
    if(d2<bd){ bd=d2; bt=t; }
  }
  if(!bt) return;
  parasols.push({ t: bt });
  el.paras.textContent = W.parasols - parasols.length;
  tone(340,.09,'triangle',.18); tone(520,.12,'triangle',.12,null,.06);
}

/* ---------- walkers: tile-based, re-routed on every snap ---------- */
const SKIN=['#F6C9A0','#E8B48A','#C68B59','#8D5A3A'], SHIRT=['#8FB8DE','#A7D8C9','#E7C6E0','#F0E2B6','#B8C4E8'];
function spawnWalker(){
  walkers.push({ tile: DOOR, next:null, t:0, heat:0, fanCd:0, waiting:false,
    speed:rand(.8,1.05), phase:rand(0,TAU), jig:rand(-6,6),
    skin:SKIN[Math.floor(Math.random()*SKIN.length)],
    shirt:SHIRT[Math.floor(Math.random()*SHIRT.length)],
    tieHue:rand(0,360) });
  spawnedN++;
}
function walkerScreen(w){
  const a = project(w.tile.x, w.tile.y+1, w.tile.z);
  if(!w.next) return { sx:a.sx + (w.waiting? w.jig : 0), sy:a.sy, depth:a.depth };
  const b = project(w.next.x, w.next.y+1, w.next.z);
  return { sx:lerp(a.sx,b.sx,w.t), sy:lerp(a.sy,b.sy,w.t), depth:lerp(a.depth,b.depth,w.t) };
}

function update(dt){
  if(!dragging) yaw += (yawTarget-yaw)*Math.min(1,dt*8);
  updateParticles(dt);
  if(mode!=='walk') return;

  if(spawnedN < W.count){ spawnT -= dt; if(spawnT<=0){ spawnWalker(); spawnT = 1.6; } }

  const canMove = settled();
  for(let i=walkers.length-1;i>=0;i--){
    const w = walkers[i];
    w.fanCd -= dt; w.phase += dt*(w.waiting?2.5:9);

    // heat never stops — waiting at a seam is exactly as sweaty as it sounds
    const ws = walkerScreen(w);
    const shaded = parasols.some(pp=>{
      const q = project(pp.t.x, pp.t.y+1, pp.t.z);
      return (q.sx-ws.sx)**2 + (q.sy-ws.sy)**2 < (TILE*1.15)**2;
    });
    w.heat += W.heat * (shaded ? 0.2 : 1) * dt;
    if(w.heat>=100){
      meltedCount++; el.melted.textContent=meltedCount;
      sfx.melt();
      walkers.splice(i,1);
      continue;
    }

    if(w.next){
      if(canMove || w.t>0){ // finish a step even if the world turned mid-stride
        w.t += dt * w.speed * 1.1;
        if(w.t>=1){
          w.tile = w.next; w.next = null; w.t = 0;
          if(POOLS.some(p=>keyOf(p)===keyOf(w.tile))){
            savedCount++; el.saved.textContent=savedCount;
            sfx.save();
            const p = walkerScreen(w);
            for(let k=0;k<14;k++){ const a=rand(-Math.PI,0);
              particles.push({sx:p.sx, sy:p.sy, vx:Math.cos(a)*rand(30,80), vy:Math.sin(a)*rand(40,100), life:rand(.4,.8), max:.8, color:'#BFE9F7', size:rand(2,3.5)});
            }
            walkers.splice(i,1);
            continue;
          }
        }
      }
    } else if(canMove){
      const route = routeFrom(w.tile, true);
      if(route && route.length>1){
        // don't pile onto a tile someone is already walking toward
        const takken = walkers.some(o=>o!==w && ((o.next && keyOf(o.next)===keyOf(route[1])) || (!o.next && keyOf(o.tile)===keyOf(route[1]))));
        if(!takken){ w.next = route[1]; w.t = 0; w.waiting = false; }
        else w.waiting = true;
      } else w.waiting = true;
    }
  }

  if(spawnedN>=W.count && walkers.length===0 && mode==='walk') finishWorld();
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    p.vy += 140*dt; p.sx += p.vx*dt; p.sy += p.vy*dt;
  }
}

/* ============================================================
   RENDER — pastel void, floating island, flat-shaded blocks
   ============================================================ */
const MATS = {
  stone:  { top:'#F2D8B8', left:'#DBA97E', right:'#C08558' },
  walk:   { top:'#FDF3DC', left:'#E3BC90', right:'#CB9668' },
  pool:   { top:'#7FD1E8', left:'#5FA8A0', right:'#4E938B' },
  office: { top:'#E89B82', left:'#C96F5C', right:'#A85546' },
  accent: { top:'#CBAED6', left:'#A886BC', right:'#8A6A9E' },
  garden: { top:'#A7D8A0', left:'#7FB278', right:'#639260' },
};

function drawBlock(b, bobY){
  const cx = CW/2, cy = CH*0.46 + bobY;
  const m = MATS[b.m] || MATS.stone;
  const corner = (ox,oz,y_)=>{ const q = project(b.x+ox, y_, b.z+oz); return [cx+q.sx, cy+q.sy]; };
  const t1=corner(0,0,b.y+1), t2=corner(1,0,b.y+1), t3=corner(1,1,b.y+1), t4=corner(0,1,b.y+1);
  const b1=corner(0,0,b.y),   b2=corner(1,0,b.y),   b3=corner(1,1,b.y),   b4=corner(0,1,b.y);
  const poly = (pts,fill)=>{ ctx.fillStyle=fill; ctx.strokeStyle=fill; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(...pts[0]); for(let i=1;i<pts.length;i++) ctx.lineTo(...pts[i]);
    ctx.closePath(); ctx.fill(); ctx.stroke(); };
  const faces = [
    { pts:[t2,t3,b3,b2], n:[ 1, 0] },
    { pts:[t3,t4,b4,b3], n:[ 0, 1] },
    { pts:[t1,t2,b2,b1], n:[ 0,-1] },
    { pts:[t4,t1,b1,b4], n:[-1, 0] },
  ];
  const cs = Math.cos(yaw), sn = Math.sin(yaw);
  for(const f of faces){
    const rxn = f.n[0]*cs - f.n[1]*sn, rzn = f.n[0]*sn + f.n[1]*cs;
    if(rxn + rzn <= 0.02) continue;
    poly(f.pts, (rxn - rzn) > 0 ? m.right : m.left);
  }
  poly([t1,t2,t3,t4], m.top);
  if(b.m==='pool'){
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.6;
    const mx=(t1[0]+t3[0])/2, my=(t1[1]+t3[1])/2, ph=(performance.now()/900 + b.x + b.z)%1;
    ctx.globalAlpha = .3+.4*Math.sin(ph*Math.PI);
    ctx.beginPath(); ctx.moveTo(mx-10, my+(ph-.5)*8); ctx.quadraticCurveTo(mx, my+2+(ph-.5)*8, mx+10, my+(ph-.5)*8); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  if(b.m==='garden'){
    const mx=(t1[0]+t3[0])/2, my=(t1[1]+t3[1])/2;
    ctx.fillStyle='#FF8FAF';
    for(const [fx,fy] of [[-6,-2],[4,-4],[0,3]]){
      ctx.beginPath(); ctx.arc(mx+fx, my+fy, 2.4, 0, TAU); ctx.fill();
    }
  }
  if(b.m==='office' && b.y===0 && DOOR && b.z===DOOR.z && Math.abs(b.x-DOOR.x)===1){
    const dm = [(t2[0]+b3[0]+t3[0]+b2[0])/4, (t2[1]+b3[1]+t3[1]+b2[1])/4];
    ctx.fillStyle='#7E4638';
    ctx.beginPath(); ctx.ellipse(dm[0], dm[1]+3, 6.5, 9, 0, 0, TAU); ctx.fill();
  }
}

function drawWalker(w, bobY){
  const p = walkerScreen(w);
  const cx = CW/2 + p.sx, cy = CH*0.46 + p.sy + bobY;
  const heat = w.heat/100, bob = Math.sin(w.phase)*1.4;
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle='rgba(90,50,70,.3)';
  ctx.beginPath(); ctx.ellipse(0, 2, 8, 3, 0, 0, TAU); ctx.fill();
  const lp=Math.sin(w.phase);
  ctx.strokeStyle='#5A5F73'; ctx.lineWidth=3.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,-10+bob*.3); ctx.lineTo(-2+lp*3.4, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-10+bob*.3); ctx.lineTo(2-lp*3.4, 0); ctx.stroke();
  const mixC=(h1,t)=>{
    const p1=parseInt(h1.slice(1),16), r=(p1>>16)&255,g=(p1>>8)&255,bl=p1&255;
    return `rgb(${Math.round(lerp(r,255,t*.6))},${Math.round(lerp(g,90,t*.6))},${Math.round(lerp(bl,70,t*.6))})`;
  };
  ctx.fillStyle=mixC(w.shirt, heat);
  ctx.beginPath(); ctx.roundRect(-6,-22+bob,12,14,4); ctx.fill();
  ctx.fillStyle=`hsl(${w.tieHue} 60% 52%)`;
  ctx.beginPath(); ctx.moveTo(0,-21+bob); ctx.lineTo(1.8,-17+bob); ctx.lineTo(0,-11+bob); ctx.lineTo(-1.8,-17+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle=w.skin;
  ctx.beginPath(); ctx.arc(0,-27+bob,5.4,0,TAU); ctx.fill();
  ctx.fillStyle='#3B2B27';
  ctx.beginPath(); ctx.arc(0,-29+bob,4.6,Math.PI*1.05,Math.PI*1.95); ctx.fill();
  if(w.waiting){ // impatient "…" while stranded at a broken seam
    ctx.fillStyle='rgba(255,246,232,.92)';
    ctx.beginPath(); ctx.roundRect(-10,-44+bob,20,11,5.5); ctx.fill();
    ctx.fillStyle='#5A3A4A';
    const on = Math.floor(performance.now()/400)%3;
    for(let i=0;i<3;i++){
      ctx.globalAlpha = on>=i ? 1 : .25;
      ctx.beginPath(); ctx.arc(-4.5+i*4.5, -38.5+bob, 1.5, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if(w.heat>15){
    ctx.fillStyle='rgba(58,32,48,.4)'; ctx.fillRect(-9,-52+bob,18,4);
    ctx.fillStyle = heat<0.5?'#FFD66B':heat<0.8?'#FF9A5C':'#F0503C';
    ctx.fillRect(-9,-52+bob,18*heat,4);
  }
  ctx.restore();
}

let last=performance.now();
function frame(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  update(dt);
  const t=now/1000;

  ctx.setTransform(dpr,0,0,dpr,0,0);
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#FFD9B8'); g.addColorStop(.45,'#F0A8A8'); g.addColorStop(1,'#C9A7E8');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='rgba(255,255,255,.35)';
  for(let i=0;i<14;i++){
    const mx=((i*167)%(CW+40))-20 + Math.sin(t*.3+i)*10;
    const my=((i*247 + t*9)%(CH+40))-20;
    ctx.beginPath(); ctx.arc(mx,my, 1.4+(i%3)*.7, 0, TAU); ctx.fill();
  }
  const bobY = Math.sin(t*0.8)*5;
  ctx.fillStyle='rgba(90,50,110,.18)';
  ctx.beginPath(); ctx.ellipse(CW/2, CH*0.46 + 150 + bobY*0.3, 150, 30, 0, 0, TAU); ctx.fill();

  const sorted=[...B].sort((a,b2)=>{
    const pa=project(a.x,a.y,a.z), pb=project(b2.x,b2.y,b2.z);
    return (pa.depth - pb.depth) || (a.y - b2.y);
  });
  for(const b of sorted) drawBlock(b, bobY);

  // parasols (world-anchored — they orbit with the island)
  for(const pp of parasols){
    const q = project(pp.t.x, pp.t.y+1, pp.t.z);
    const px = CW/2 + q.sx, py = CH*0.46 + q.sy + bobY;
    ctx.fillStyle = 'rgba(96,70,140,.16)';
    ctx.beginPath(); ctx.ellipse(px, py, TILE*0.95, TILE*0.55, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#8A5A45'; ctx.lineWidth = 2.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py-26); ctx.stroke();
    const R = 17, wob = Math.sin(t*2 + pp.t.x)*1.2;
    ctx.fillStyle = '#FF8B7E';
    ctx.beginPath(); ctx.arc(px, py-26+wob*.3, R, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FFD3B8';
    ctx.beginPath(); ctx.moveTo(px, py-26+wob*.3);
    ctx.arc(px, py-26+wob*.3, R, Math.PI+Math.PI/4, Math.PI+Math.PI/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FF8B7E';
    for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(px-R+(i+0.5)*(R/2), py-26+wob*.3, R/4.4, 0, Math.PI); ctx.fill(); }
  }

  const ws=[...walkers].sort((a,b2)=>walkerScreen(a).depth - walkerScreen(b2).depth);
  for(const w of ws) drawWalker(w, bobY);

  for(const p of particles){
    ctx.globalAlpha=clamp(p.life/p.max,0,1);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(CW/2+p.sx, CH*0.46+p.sy, p.size, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
loadWorld(parseInt(localStorage.getItem('btw_world')||'0') || 0);

/* debug handle for tests */
window.__tw = {
  state: ()=>({ mode, wi, yaw, yawTarget, snap: snapIndex(yawTarget), saved: savedCount, melted: meltedCount,
                parasols: parasols.length, waiting: walkers.filter(w=>w.waiting).length,
                tiles: walkers.map(w=>keyOf(w.tile)) }),
  pathAt: i=>{ const keep=G; G=graphAt(i); const p=routeFrom(DOOR); G=keep; return p && p.length; },
  setYaw: i=>{ yaw = yawTarget = SNAPS[i]; if(mode==='spin') refreshGate(); else G = graphAt(i); },
  load: i=>loadWorld(i),
  open: ()=>openDoors(),
  tileXY: (x,y,z)=>{ const q=project(x,y+1,z); return { x: CW/2+q.sx, y: CH*0.46+q.sy }; },
};
</script>
