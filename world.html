<script>
"use strict";
/* ============================================================
   TINY WORLD — rotatable Escher-in-pastel dioramas.
   TWO axes now: drag sideways to orbit (4 yaws) and drag up or
   down to tilt between two camera elevations — 8 views total,
   each with its own screen-space walk graph (the Fez/Monument
   Valley trick). Plus rotor-cranks that spin sub-structures and
   waterfalls that block tiles until diverted at a valve.
   ============================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr=1, CW=0, CH=0;
function resize(){
  dpr = Math.min(devicePixelRatio||1, 2.5);
  const r = canvas.getBoundingClientRect();
  CW = r.width; CH = r.height;
  canvas.width = Math.round(CW*dpr); canvas.height = Math.round(CH*dpr);
}
addEventListener('resize', resize); resize(); setTimeout(resize, 350);

const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);

/* ---------- tiny synth ---------- */
let AC=null;
function tone(f,d,type='sine',v=.14,slide=null,when=0){
  try{ AC = AC || new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  if(AC.state==='suspended') AC.resume();
  const t0=AC.currentTime+when, o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide,1),t0+d);
  g.gain.setValueAtTime(v,t0); g.gain.exponentialRampToValueAtTime(.0001,t0+d);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+d+.05);
}
const sfx = {
  snap(){ tone(300,.09,'triangle',.16); tone(450,.12,'triangle',.10,null,.05); },
  tiltup(){ tone(360,.1,'triangle',.14,520); },
  tiltdn(){ tone(520,.1,'triangle',.14,360); },
  crank(){ tone(150,.12,'square',.11,80); tone(95,.1,'square',.08,null,.1); },
  valve(){ tone(220,.14,'triangle',.12,140); tone(700,.08,'sine',.06,null,.12); },
  buzz(){ tone(110,.2,'sawtooth',.07,70); },
  connect(){ [523,659,784].forEach((f,i)=>tone(f,.18,'sine',.12,null,i*.09)); },
  fan(){ tone(1200,.06,'triangle',.05,700); },
  save(){ tone(320,.1,'sine',.16,120); tone(660,.14,'sine',.11,null,.08); tone(880,.16,'sine',.1,null,.16); },
  melt(){ tone(280,.5,'sawtooth',.09,60); },
  win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.2,'sine',.13,null,i*.1)); },
};

/* ============================================================
   WORLDS — builders share the world centre (3.5, 2.5).
   add(x,y,z,mat,grp) — grp ties blocks to a rotor-crank.
   Worlds may define cranks:[{px,pz,tag}] and falls:
   [{top:{x,y,z}, tile:{x,y,z}, valve:{x,y,z}}].
   ============================================================ */
let B = [], TOPS = [], DOOR = null, POOLS = [], CRANKS = [], FALLS = [], DECO = {};
const add = (x,y,z,m,grp)=>B.push(grp ? {x,y,z,m,grp} : {x,y,z,m});
const col = (x,z,h,m='stone')=>{ for(let y=0;y<h;y++) add(x,y,z,m); };
function baseOffice(){ // door tower + deck A (x=1..3, walk tops at surf 2)
  col(0,3,3,'office'); col(0,4,3,'office'); col(0,5,2,'office');
  for(let x=1;x<=3;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
}

const WORLDS = [
  { name:'The Liquid Oasis', gated:true, count:5, quota:3, heat:13, parasols:2,
    blurb:'<b>Drag sideways to spin the world.</b> Find the view where the broken walkways <i>agree</i>, then open the doors. <b>Tap a tile to plant a parasol ⛱ · hit 🌬 COLD SNAP up top when the crowd overheats.</b>',
    build(){
      baseOffice(); col(4,4,1,'stone'); add(4,1,4,'walk');
      for(let x=2;x<=5;x++){ col(x,0,3,'stone'); add(x,3,0,'walk'); }
      col(5,1,3,'stone'); add(5,3,1,'walk');
      col(5,2,3,'stone'); add(5,3,2,'walk');
      col(6,0,3,'stone'); col(6,1,3,'stone'); add(6,3,0,'pool'); add(6,3,1,'pool');
      col(7,0,3,'stone'); col(7,1,3,'stone'); add(7,3,0,'pool'); add(7,3,1,'pool');
      col(6,4,1,'accent'); add(6,1,4,'garden');
      col(2,2,2,'accent'); add(2,2,2,'garden');
      col(7,2,3,'accent'); add(7,3,2,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:6,y:3,z:0},{x:6,y:3,z:1},{x:7,y:3,z:0},{x:7,y:3,z:1}] };
    } },
  { name:'The Rooftop Was Upstairs', gated:true, noTilt:true, startView:3, count:5, quota:3, heat:4.5, parasols:2,
    blurb:'The pool, it turns out, is on the office roof. From most angles that is a problem. From <b>exactly one angle</b>, the doorway, the ledge and the rooftop all… agree. Keep spinning until they do.',
    build(){
      col(0,3,3,'office'); col(0,4,3,'office'); col(0,5,3,'office');
      for(let x=1;x<=3;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
      col(2,2,3,'stone');
      for(let x=0;x<=2;x++) add(x,3,2,'walk');
      add(0,3,3,'walk'); add(0,3,4,'pool'); add(0,3,5,'pool');
      col(6,1,2,'accent'); add(6,2,1,'garden');
      col(7,4,1,'accent'); add(7,1,4,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:0,y:3,z:4},{x:0,y:3,z:5}] };
    } },
  { name:'The Long Way Around', gated:false, noTilt:true, count:6, quota:4, heat:4.6, parasols:1,
    blurb:'No single view works here. Open the doors, stage the crowd on the <b>high spine</b> (east face), then swing to the <b>west face</b> to bring them down to the water. They cook while you turn.',
    build(){
      baseOffice();
      // the high spine — a floating walkway far above the plaza

      add(2,3,0,'walk'); add(3,3,0,'pool'); add(4,3,0,'pool');

      col(7,4,1,'accent'); add(7,1,4,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:3,y:3,z:0},{x:4,y:3,z:0}] };
    } },
  { name:'The Overlook', gated:true, count:5, quota:3, heat:12, parasols:2,
    blurb:'A new axis: <b>drag UP or DOWN to tilt the world.</b> From the ordinary angle this pool is unreachable — but look at it <i>steeply</i> enough…',
    build(){
      baseOffice();
      col(5,2,2,'stone');
      add(4,2,2,'walk'); add(5,2,2,'pool'); add(6,2,2,'pool');
      col(6,0,1,'accent'); add(6,1,0,'garden');
      col(1,1,1,'accent'); add(1,1,1,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:5,y:2,z:2},{x:6,y:2,z:2}] };
    } },
  { name:'The Crank', gated:true, count:5, quota:3, heat:11, parasols:2,
    blurb:'That bridge is real, physical, and pointing the wrong way. <b>Tap the bolted slab to crank it 90°.</b> No spinning required — though it never hurts to look around.',
    cranks:[{px:5, pz:4, tag:'b1'}],
    build(){
      baseOffice();
      // rotor bridge: 3 floating slabs, initially perpendicular to the path
      add(5,1,3,'walk','b1'); add(5,1,4,'crank','b1'); add(5,1,5,'walk','b1');
      // landing deck + pool
      col(7,4,1,'stone'); add(7,1,4,'walk');
      col(7,3,1,'stone'); add(7,1,3,'pool');
      col(7,2,1,'stone'); add(7,1,2,'pool');
      col(2,1,2,'accent'); add(2,2,1,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:7,y:1,z:3},{x:7,y:1,z:2}] };
    } },
  { name:'Water Feature', gated:true, count:5, quota:3, heat:11, parasols:2,
    blurb:'The path is fine. The decorative waterfall crashing onto it is not. <b>Tap the valve wheel to divert it</b> — standing under it is refreshing but not productive.',
    falls:[{ top:{x:5,y:3,z:4}, tile:{x:5,y:1,z:4}, valve:{x:3,y:1,z:2} }],
    build(){
      baseOffice();
      for(let x=4;x<=6;x++){ col(x,4,1,'stone'); add(x,1,4,'walk'); }
      col(7,4,1,'stone'); add(7,1,4,'pool');
      col(7,3,1,'stone'); add(7,1,3,'pool');
      add(5,3,4,'pool'); // the floating fountain cube
      col(3,2,1,'accent'); add(3,1,2,'valve');
      col(6,1,1,'accent'); add(6,1,1,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:7,y:1,z:4},{x:7,y:1,z:3}] };
    } },
  { name:'Plumbing Issue', gated:true, noTilt:true, count:5, quota:3, heat:11, parasols:2,
    blurb:'The oasis route again — but Facilities installed a decorative waterfall right on the walkway. <b>Divert it at the valve wheel</b>, then find the view where the walkways agree.',
    falls:[{ top:{x:5,y:6,z:1}, tile:{x:5,y:3,z:1}, valve:{x:4,y:1,z:2} }],
    build(){
      baseOffice(); col(4,4,1,'stone'); add(4,1,4,'walk');
      for(let x=2;x<=5;x++){ col(x,0,3,'stone'); add(x,3,0,'walk'); }
      col(5,1,3,'stone'); add(5,3,1,'walk');
      col(5,2,3,'stone'); add(5,3,2,'walk');
      col(6,0,3,'stone'); col(6,1,3,'stone'); add(6,3,0,'pool'); add(6,3,1,'pool');
      col(7,0,3,'stone'); col(7,1,3,'stone'); add(7,3,0,'pool'); add(7,3,1,'pool');
      add(5,6,1,'pool'); // the offending water feature, floating high
      col(4,2,1,'accent'); add(4,1,2,'valve');
      col(2,2,2,'accent'); add(2,2,2,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:6,y:3,z:0},{x:6,y:3,z:1},{x:7,y:3,z:0},{x:7,y:3,z:1}] };
    } },
  { name:'High & Dry', gated:true, count:5, quota:3, heat:10, parasols:2,
    blurb:'The steep view again — but the ledge is under a waterfall. <b>Valve first, then tilt.</b> Two axes, one wet ledge, five believers.',
    falls:[{ top:{x:4,y:5,z:2}, tile:{x:4,y:2,z:2}, valve:{x:2,y:1,z:1} }],
    build(){
      baseOffice();
      col(5,2,2,'stone');
      add(4,2,2,'walk'); add(5,2,2,'pool'); add(6,2,2,'pool');
      add(4,5,2,'pool'); // fountain cube high above the ledge
      col(2,1,1,'accent'); add(2,1,1,'valve');
      col(6,0,1,'accent'); add(6,1,0,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:5,y:2,z:2},{x:6,y:2,z:2}] };
    } },
  { name:'Rush Hour', gated:false, noTilt:true, count:8, quota:6, heat:5, parasols:1,
    blurb:'Eight coworkers, one parasol, and a waterfall crashing on the high spine where they need to stage. Divert it, juggle the faces, and try not to think about the org chart.',
    falls:[{ top:{x:2,y:7,z:2}, tile:{x:2,y:5,z:2}, valve:{x:6,y:1,z:2} }],
    build(){
      baseOffice();
      col(2,3,5,'stone');
      add(2,5,2,'walk'); add(2,5,3,'walk'); add(2,5,4,'walk');
      col(3,0,3,'stone');
      add(2,3,0,'walk'); add(3,3,0,'pool'); add(4,3,0,'pool');
      add(2,7,2,'pool'); // the fall's source, hanging in the sky
      col(6,2,1,'accent'); add(6,1,2,'valve');
      col(7,4,1,'accent'); add(7,1,4,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:3,y:3,z:0},{x:4,y:3,z:0}] };
    } },
  { name:'Peak Liquidity Summit', gated:true, count:6, quota:5, heat:10, parasols:2,
    blurb:'The finale: crank the bridge, divert the fall, save <b>5 of 6</b> — including, reportedly, someone from Leadership. The pool is earned, not given.',
    cranks:[{px:5, pz:4, tag:'b1'}],
    falls:[{ top:{x:7,y:4,z:4}, tile:{x:7,y:1,z:4}, valve:{x:1,y:1,z:2} }],
    build(){
      baseOffice();
      add(5,1,3,'walk','b1'); add(5,1,4,'crank','b1'); add(5,1,5,'walk','b1');
      col(7,4,1,'stone'); add(7,1,4,'walk');
      col(7,3,1,'stone'); add(7,1,3,'pool');
      col(7,2,1,'stone'); add(7,1,2,'pool');
      add(7,4,4,'pool'); // fountain over the landing
      col(1,2,1,'accent'); add(1,1,2,'valve');
      col(3,1,2,'accent'); add(3,2,1,'garden');
      return { door:{x:1,y:1,z:4}, pools:[{x:7,y:1,z:3},{x:7,y:1,z:2}] };
    } },
];
let wi = 0;

/* ---------- projection: yaw + tilt ---------- */
const TILE = 34;
let yaw = 0, yawTarget = 0, tiltT = 0, tiltTarget = 0, dragging=false, spun=false;

function project(x,y,z,cy=yaw,tt=tiltT){
  const dx = x-3.5, dz = z-2.5;
  const rx = dx*Math.cos(cy) - dz*Math.sin(cy);
  const rz = dx*Math.sin(cy) + dz*Math.cos(cy);
  return {
    sx: (rx - rz) * TILE,
    sy: (rx + rz) * TILE*0.5 - y * TILE*0.5 * (1+tt),
    depth: rx + rz + y*0.001,
  };
}
const SNAPS = [0,1,2,3].map(k=>k*Math.PI/2);
const snapIndex = a => {
  let best=0, bd=1e9;
  for(let i=0;i<4;i++){ const d=Math.abs(Math.atan2(Math.sin(a-SNAPS[i]),Math.cos(a-SNAPS[i]))); if(d<bd){bd=d;best=i;} }
  return best;
};
const settled = () => !dragging && Math.abs(yaw-yawTarget) < 0.03 && Math.abs(tiltT-tiltTarget) < 0.03;

/* ---------- walkable tops (crank + waterfall aware) ---------- */
const keyOf = t => `${t.x},${t.y},${t.z}`;
const WALKMATS = new Set(['walk','pool','crank']);
function blockedKeys(){
  const s = new Set();
  for(const f of FALLS) if(!f.diverted) s.add(`${f.tile.x},${f.tile.y},${f.tile.z}`);
  return s;
}
function recomputeWalk(){
  const occ = new Set(B.map(keyOf));
  const blocked = blockedKeys();
  TOPS = B.filter(b => WALKMATS.has(b.m) && !occ.has(`${b.x},${b.y+1},${b.z}`) && !blocked.has(keyOf(b)));
  buildPotential();
  G = graphAt(snapIndex(yawTarget), tiltTarget);
}

/* ---------- screen-space walk graph, per (yaw, tilt) view ---------- */
function graphAt(yawIdx, tiltIdx){
  const a = SNAPS[yawIdx], m = 1 + tiltIdx;
  const cells = new Map();
  for(const t of TOPS){
    const p = project(t.x, t.y+1, t.z, a, tiltIdx);
    const u = Math.round(p.sx / TILE), v = Math.round(p.sy / (TILE*0.5));
    const k = u+','+v;
    const prev = cells.get(k);
    if(!prev || p.depth > prev.depth) cells.set(k, {t, u, v, depth:p.depth});
  }
  const nodes = [...cells.values()];
  const byUV = new Map(nodes.map(n=>[n.u+','+n.v, n]));
  const edges = new Map(nodes.map(n=>[keyOf(n.t), []]));
  for(const n of nodes){
    for(const [du,dv] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
      const q = byUV.get((n.u+du)+','+(n.v+dv));
      if(q) edges.get(keyOf(n.t)).push(q.t);
    }
  }
  return { edges, visible:new Set(nodes.map(n=>keyOf(n.t))), byUV, yv:yawIdx, tv:tiltIdx };
}
// what the eye sees is the law: a walker standing on an OCCLUDED tile can
// still step OUT onto whatever is visibly adjacent to its screen cell
function occludedExits(g, tile){
  const p = project(tile.x, tile.y+1, tile.z, SNAPS[g.yv], g.tv);
  const u = Math.round(p.sx / TILE), v = Math.round(p.sy / (TILE*0.5));
  const out = [];
  for(const [du,dv] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
    const n = g.byUV.get((u+du)+','+(v+dv));
    if(n) out.push(n.t);
  }
  return out;
}
let G = null;
let POT = new Map(); // hop distance to pool over the union of all 8 views
function buildPotential(){
  const union = new Map(TOPS.map(t=>[keyOf(t), new Set()]));
  const tmax = W.noTilt ? 1 : 2;
  for(let yv=0; yv<4; yv++) for(let tv=0; tv<tmax; tv++){
    const g = graphAt(yv, tv);
    for(const [k, es] of g.edges) for(const nb of es) union.get(k).add(keyOf(nb));
    for(const t of TOPS) if(!g.visible.has(keyOf(t)))
      for(const nb of occludedExits(g, t)) union.get(keyOf(t)).add(keyOf(nb));
  }
  POT = new Map();
  const q = [];
  for(const p of POOLS){ if(union.has(keyOf(p))){ POT.set(keyOf(p), 0); q.push(keyOf(p)); } }
  while(q.length){
    const k = q.shift(), d = POT.get(k);
    for(const [k2, es] of union)
      if(!POT.has(k2) && es.has(k)){ POT.set(k2, d+1); q.push(k2); }
  }
}
function routeFrom(tile, allowFrontier=false){
  if(!G) return null;
  const goal = new Set(POOLS.map(keyOf));
  const q=[], prev=new Map([[keyOf(tile),null]]);
  const order=[tile];
  if(G.visible.has(keyOf(tile))) q.push(tile);
  else if(allowFrontier) for(const t of occludedExits(G, tile)){
    // hidden-tile escape hatch: for walkers stranded mid-journey only —
    // the door gate has to believe its eyes and see a full route
    if(prev.has(keyOf(t))) continue;
    prev.set(keyOf(t), tile); q.push(t); order.push(t);
  }
  else return null;
  while(q.length){
    const cur=q.shift();
    if(goal.has(keyOf(cur))){
      const path=[cur]; let k=prev.get(keyOf(cur));
      while(k){ path.unshift(k); k=prev.get(keyOf(k)); }
      return path;
    }
    for(const nb of (G.edges.get(keyOf(cur))||[])){
      if(prev.has(keyOf(nb))) continue;
      prev.set(keyOf(nb), cur); q.push(nb); order.push(nb);
    }
  }
  if(!allowFrontier) return null;
  const pot = t => POT.has(keyOf(t)) ? POT.get(keyOf(t)) : Infinity;
  let best=null, bd=pot(tile) - 0.5;
  for(const t of order){ const d = pot(t); if(d < bd){ bd=d; best=t; } }
  if(!best) return null;
  const path=[best]; let k=prev.get(keyOf(best));
  while(k){ path.unshift(k); k=prev.get(keyOf(k)); }
  return path.length>1 ? path : null;
}

/* ---------- state ---------- */
const $ = s=>document.querySelector(s);
const el = { saved:$('#saved'), paras:$('#paras'), mistBtn:$('#mistBtn'), melted:$('#melted'), quota:$('#quota'), status:$('#status'),
             goBtn:$('#goBtn'), modal:$('#modal'), startBtn:$('#startBtn'),
             mKicker:$('#mKicker'), mName:$('#mName'), mBlurb:$('#mBlurb') };
let mode='spin';
let walkers=[], savedCount=0, meltedCount=0, spawnT=0, spawnedN=0, particles=[], parasols=[];
let W = WORLDS[0], crankAnims = {}, stuckT = 0;
let mistCd = 0; const MIST_CD = 15, MIST_AMOUNT = 22;
let hintT = -1;

function loadWorld(i){
  wi = clamp(i, 0, WORLDS.length-1);
  W = WORLDS[wi];
  B = []; CRANKS = (W.cranks||[]).map(c=>({...c}));
  FALLS = (W.falls||[]).map(f=>({...f, diverted:false}));
  const r = W.build.call(null);
  DOOR = r.door; POOLS = r.pools;
  // hand out the set dressing: an AC unit for the tallest office roof,
  // and a nap spot for the cat on the first open garden block
  const occD = new Set(B.map(keyOf));
  DECO = {};
  const roofs = B.filter(b=>b.m==='office' && !occD.has(`${b.x},${b.y+1},${b.z}`));
  if(roofs.length) DECO.ac = keyOf(roofs.reduce((p,c)=>c.y>p.y?c:p));
  const lawns = B.filter(b=>b.m==='garden' && !occD.has(`${b.x},${b.y+1},${b.z}`));
  if(lawns.length) DECO.cat = keyOf(lawns[0]);
  walkers=[]; parasols=[]; particles=[]; crankAnims={};
  savedCount=0; meltedCount=0; spawnT=0; spawnedN=0; stuckT=0;
  mistCd=0; el.mistBtn.textContent='🌬 ready';
  mode='spin'; yaw = yawTarget = SNAPS[W.startView||0]; tiltT=0; tiltTarget=0; spun=false;
  recomputeWalk();
  el.saved.textContent=0; el.melted.textContent=0;
  el.quota.textContent=W.quota; el.paras.textContent=W.parasols;
  el.mKicker.textContent = `Tiny World № ${wi+1} of ${WORLDS.length}`;
  el.mName.textContent = W.name;
  el.mBlurb.innerHTML = W.blurb;
  el.modal.classList.remove('hidden');
  el.goBtn.classList.remove('hidden');
  el.goBtn.onclick = openDoors;
  localStorage.setItem('btw_world', String(wi));
  refreshGate();
}

function setStatus(msg){ el.status.textContent = msg; }
function refreshGate(){
  if(mode!=='spin') return;
  G = graphAt(snapIndex(yawTarget), tiltTarget);
  const full = routeFrom(DOOR);
  if(W.gated){
    el.goBtn.disabled = !full;
    el.goBtn.textContent = full ? '🚪 OPEN THE DOORS' : '🧩 FIND THE WAY';
    setStatus(full ? 'the walkways agree ✨'
      : (spun ? (W.noTilt ? 'not like this… keep spinning ⟲' : 'not like this… spin ⟲ or tilt ⇅')
              : 'spin the world 🌍'));
  } else {
    el.goBtn.disabled = false;
    el.goBtn.textContent = '🚪 OPEN THE DOORS';
    setStatus(full ? 'the walkways agree ✨' : 'no through-path yet — you’ll solve it mid-walk 🌀');
  }
}
function openDoors(){
  if(mode!=='spin' || el.goBtn.disabled) return;
  mode='walk';
  el.goBtn.classList.add('hidden');
  G = graphAt(snapIndex(yawTarget), tiltTarget);
  setStatus('doors open — here they come');
  hintT = 3.5; // remind them about the cooling gear once the crowd is out
  sfx.connect();
}
function finishWorld(){
  mode='done';
  const win = savedCount >= W.quota;
  if(win){
    sfx.win();
    const last = wi === WORLDS.length-1;
    setStatus(last ? `☀️ all ${WORLDS.length} tiny worlds conquered. legend.` : `☀️ ${savedCount}/${W.count} reached the water!`);
    el.goBtn.textContent = last ? '↻ FROM THE TOP' : '🌍 NEXT WORLD';
    el.goBtn.onclick = ()=>loadWorld(last ? 0 : wi+1);
  } else {
    setStatus('🫠 the oasis remains theoretical…');
    el.goBtn.textContent = '↻ SPIN AGAIN';
    el.goBtn.onclick = ()=>loadWorld(wi);
  }
  el.goBtn.disabled = false;
  el.goBtn.classList.remove('hidden');
}

el.startBtn.addEventListener('click', ()=>{ el.modal.classList.add('hidden'); tone(500,.1,'triangle',.12); });
el.mistBtn.addEventListener('click', ()=>{
  if(mode!=='walk' || mistCd>0 || !walkers.length) return;
  mistCd = MIST_CD;
  sfx.fan(); sfx.save();
  for(const w2 of walkers){
    w2.heat = Math.max(0, w2.heat - MIST_AMOUNT);
    const p = walkerScreen(w2);
    for(let i=0;i<8;i++){ const a=i/8*TAU;
      particles.push({sx:p.sx+Math.cos(a)*12, sy:p.sy-16+Math.sin(a)*8, vx:Math.cos(a+1.6)*50, vy:Math.sin(a+1.6)*34-10, life:.5, max:.5, color:'#DFF3FF', size:2.6});
    }
  }
  setStatus('🌬 a merciful gust sweeps the world');
});

/* ---------- input: 2-axis orbit, taps for crank/valve/fan/parasol ---------- */
let px0=0, py0=0, yaw0=0, tilt0=0, moved=0, axisLock=null;
canvas.addEventListener('pointerdown', e=>{
  dragging=true; moved=0; axisLock=null; px0=e.clientX; py0=e.clientY; yaw0=yaw; tilt0=tiltT;
});
canvas.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dx = e.clientX-px0, dy = e.clientY-py0;
  moved = Math.max(moved, Math.abs(dx), Math.abs(dy));
  // one gesture, one axis: whichever way the drag starts is the way it stays
  if(!axisLock && moved>10) axisLock = Math.abs(dx) >= Math.abs(dy) ? 'yaw' : 'tilt';
  if(axisLock==='yaw') yaw = yaw0 + dx*0.012;
  else if(axisLock==='tilt'){
    if(W.noTilt){
      tiltT = clamp(-dy*0.0012, 0, 0.08); // elastic: it leans, then springs back
      setStatus('🧭 this world only spins sideways ⟲');
    } else tiltT = clamp(tilt0 - dy*0.006, 0, 1);
  }
  spun = spun || moved>30;
});
addEventListener('pointerup', e=>{
  if(!dragging) return;
  dragging=false;
  if(moved < 8){ tapAt(e.clientX, e.clientY); }
  const idx = snapIndex(yaw);
  yawTarget = SNAPS[idx] + Math.round((yaw - SNAPS[idx])/TAU)*TAU;
  const newTilt = tiltT > 0.5 ? 1 : 0;
  if(newTilt !== tiltTarget){ tiltTarget = newTilt; newTilt ? sfx.tiltup() : sfx.tiltdn(); }
  else if(moved >= 8) sfx.snap();
  if(mode==='spin') refreshGate();
  else G = graphAt(idx, tiltTarget);
});

function tapAt(cx, cy){
  if(mode!=='walk' && mode!=='spin') return;
  const wx = (cx - CW/2), wy = (cy - CH*0.46);
  if(tapCrank(wx, wy)) return;
  if(tapValve(wx, wy)) return;
  plantParasol(wx, wy);
}
function tapCrank(wx, wy){
  for(const c of CRANKS){
    const tiles = B.filter(b=>b.grp===c.tag);
    const hit = tiles.some(b=>{
      const p = project(b.x+0.5, b.y+1, b.z+0.5);
      return (p.sx-wx)**2 + (p.sy-wy)**2 < 34*34;
    });
    if(!hit) continue;
    const occupied = walkers.some(w =>
      (w.tile.grp===c.tag) || (w.next && w.next.grp===c.tag));
    if(occupied){ sfx.buzz(); setStatus('there are PEOPLE on that.'); return true; }
    for(const b of tiles){
      const nx = c.px + (b.z - c.pz), nz = c.pz - (b.x - c.px);
      b.x = nx; b.z = nz;
    }
    crankAnims[c.tag] = Math.PI/2;
    sfx.crank();
    recomputeWalk();
    if(mode==='spin') refreshGate();
    return true;
  }
  return false;
}
function tapValve(wx, wy){
  for(const f of FALLS){
    const p = project(f.valve.x+0.5, f.valve.y+1, f.valve.z+0.5);
    if((p.sx-wx)**2 + (p.sy-wy)**2 >= 30*30) continue;
    f.diverted = !f.diverted;
    sfx.valve();
    setStatus(f.diverted ? 'waterfall diverted 💧→' : 'waterfall restored 💧');
    recomputeWalk();
    if(mode==='spin') refreshGate();
    return true;
  }
  return false;
}
function plantParasol(wx, wy){
  if(parasols.length >= W.parasols) return;
  let bt=null, bd=26*26;
  for(const t of TOPS){
    if(t.m==='pool') continue;
    if(parasols.some(p=>p.t===t)) continue;
    const p = project(t.x, t.y+1, t.z);
    const d2 = (p.sx-wx)**2 + (p.sy-wy)**2;
    if(d2<bd){ bd=d2; bt=t; }
  }
  if(!bt) return;
  parasols.push({ t: bt });
  el.paras.textContent = W.parasols - parasols.length;
  setStatus(`parasol planted ⛱ (${W.parasols - parasols.length} left)`);
  tone(340,.09,'triangle',.18); tone(520,.12,'triangle',.12,null,.06);
}

/* ---------- walkers: tile-based, re-routed on every snap ---------- */
const SKIN=['#F6C9A0','#E8B48A','#C68B59','#8D5A3A'], SHIRT=['#8FB8DE','#A7D8C9','#E7C6E0','#F0E2B6','#B8C4E8'];
function spawnWalker(){
  walkers.push({ tile: TOPS.find(t=>keyOf(t)===keyOf(DOOR)) || DOOR, next:null, t:0, heat:0, waiting:false,
    speed:rand(.8,1.05), phase:rand(0,TAU), jig:rand(-6,6),
    skin:SKIN[Math.floor(Math.random()*SKIN.length)],
    shirt:SHIRT[Math.floor(Math.random()*SHIRT.length)],
    tieHue:rand(0,360) });
  spawnedN++;
}
function walkerScreen(w){
  const a = project(w.tile.x, w.tile.y+1, w.tile.z);
  if(!w.next) return { sx:a.sx + (w.waiting? w.jig : 0), sy:a.sy, depth:a.depth };
  const b = project(w.next.x, w.next.y+1, w.next.z);
  return { sx:lerp(a.sx,b.sx,w.t), sy:lerp(a.sy,b.sy,w.t), depth:lerp(a.depth,b.depth,w.t) };
}

function update(dt){
  if(!dragging){
    yaw += (yawTarget-yaw)*Math.min(1,dt*8);
    tiltT += (tiltTarget-tiltT)*Math.min(1,dt*8);
  }
  for(const k in crankAnims) crankAnims[k] = Math.max(0, crankAnims[k] - dt*4);
  if(hintT > 0 && mode==='walk'){
    hintT -= dt;
    if(hintT <= 0 && parasols.length < W.parasols)
      setStatus(`they're cooking ☀️ — ⛱ tap a tile for shade (${W.parasols-parasols.length} left) · 🌬 cold snap up top`);
  }
  if(mistCd > 0){ mistCd = Math.max(0, mistCd - dt); el.mistBtn.textContent = mistCd>0 ? '🌬 '+Math.ceil(mistCd)+'s' : '🌬 ready'; }
  updateParticles(dt);
  if(mode!=='walk') return;

  if(spawnedN < W.count){ spawnT -= dt; if(spawnT<=0){ spawnWalker(); spawnT = 1.6; } }

  const canMove = settled();
  let anyMoving = false;
  for(let i=walkers.length-1;i>=0;i--){
    const w = walkers[i];
    w.phase += dt*(w.waiting?2.5:9);

    const ws = walkerScreen(w);
    const underFall = FALLS.some(f=>!f.diverted && keyOf(f.tile)===keyOf(w.tile) && !w.next);
    const shaded = underFall || parasols.some(pp=>{
      const q = project(pp.t.x, pp.t.y+1, pp.t.z);
      return (q.sx-ws.sx)**2 + (q.sy-ws.sy)**2 < (TILE*1.15)**2;
    });
    if(underFall) w.heat = 0; // drenched. refreshed. not going anywhere.
    else w.heat += W.heat * (shaded ? 0.2 : 1) * dt;
    if(w.diving != null){
      w.diving += dt / 0.45;
      if(w.diving >= 1){
        savedCount++; el.saved.textContent=savedCount;
        sfx.save();
        const p = walkerScreen(w);
        for(let k=0;k<18;k++){ const a=rand(-Math.PI,0);
          particles.push({sx:p.sx, sy:p.sy, vx:Math.cos(a)*rand(40,110), vy:Math.sin(a)*rand(50,130), life:rand(.4,.9), max:.9, color:'#BFE9F7', size:rand(2,4)});
        }
        particles.push({sx:p.sx, sy:p.sy+2, vx:0, vy:0, life:.6, max:.6, type:'ripple', color:'#FFFFFF', size:8});
        walkers.splice(i,1);
      }
      continue;
    }
    if(w.heat>=100){
      meltedCount++; el.melted.textContent=meltedCount;
      sfx.melt();
      walkers.splice(i,1);
      continue;
    }

    if(w.next){
      if(canMove || w.t>0){
        w.t += dt * w.speed * 1.1;
        anyMoving = true;
        if(w.t>=1){
          w.tile = w.next; w.next = null; w.t = 0;
          if(POOLS.some(p=>keyOf(p)===keyOf(w.tile))){
            w.diving = 0; // cannonball incoming
          }
        }
      }
    } else if(canMove){
      const route = routeFrom(w.tile, true);
      if(route && route.length>1){
        const taken = walkers.some(o=>o!==w && ((o.next && keyOf(o.next)===keyOf(route[1])) || (!o.next && keyOf(o.tile)===keyOf(route[1]))));
        if(!taken){ w.next = route[1]; w.t = 0; w.waiting = false; anyMoving = true; }
        else w.waiting = true;
      } else w.waiting = true;
    }
  }

  // hardening: if the whole crowd is stranded, say so instead of looking broken
  if(walkers.length>0 && !anyMoving && canMove){
    stuckT += dt;
    if(stuckT > 1.6){
      setStatus(W.noTilt ? 'no route from this angle — spin ⟲, crank bridges, divert falls'
                         : 'no route from this angle — spin ⟲ tilt ⇅ crank bridges, divert falls');
      stuckT = -3;
    }
  } else if(anyMoving) stuckT = 0;

  if(spawnedN>=W.count && walkers.length===0 && mode==='walk') finishWorld();
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    if(p.type==='ripple') continue;
    p.vy += 140*dt; p.sx += p.vx*dt; p.sy += p.vy*dt;
  }
}

/* ============================================================
   RENDER
   ============================================================ */
const MATS = {
  stone:  { top:'#F2D8B8', left:'#DBA97E', right:'#C08558' },
  walk:   { top:'#FDF3DC', left:'#E3BC90', right:'#CB9668' },
  pool:   { top:'#7FD1E8', left:'#5FA8A0', right:'#4E938B' },
  office: { top:'#E89B82', left:'#C96F5C', right:'#A85546' },
  accent: { top:'#CBAED6', left:'#A886BC', right:'#8A6A9E' },
  garden: { top:'#A7D8A0', left:'#7FB278', right:'#639260' },
  crank:  { top:'#F0C987', left:'#D3A55C', right:'#B98A45' },
  valve:  { top:'#9BC7DE', left:'#6FA3C0', right:'#587F9C' },
};

// slow weather for the middle distance
const CLOUDS = [
  { x:  40, y:.13, s:1.0, v:  7, a:.50 },
  { x: 260, y:.22, s:0.7, v: 11, a:.40 },
  { x: 150, y:.32, s:0.55, v: 15, a:.32 },
];

function groupSpin(b){
  // residual crank animation: rotate the block around its pivot
  if(!b.grp || !crankAnims[b.grp]) return null;
  const c = CRANKS.find(k=>k.tag===b.grp);
  return c ? { cx:c.px+0.5, cz:c.pz+0.5, a:crankAnims[b.grp] } : null;
}
function drawBlock(b, bobY){
  const cx = CW/2, cy = CH*0.46 + bobY;
  const m = MATS[b.m] || MATS.stone;
  const gs = groupSpin(b);
  const corner = (ox,oz,y_)=>{
    let X = b.x+ox, Z = b.z+oz;
    if(gs){ // rotate corner by residual angle around pivot (counter to the snap)
      const dx = X-gs.cx, dz = Z-gs.cz, ca = Math.cos(gs.a), sa = Math.sin(gs.a);
      X = gs.cx + dx*ca - dz*sa; Z = gs.cz + dx*sa + dz*ca;
    }
    const q = project(X, y_, Z);
    return [cx+q.sx, cy+q.sy];
  };
  const t1=corner(0,0,b.y+1), t2=corner(1,0,b.y+1), t3=corner(1,1,b.y+1), t4=corner(0,1,b.y+1);
  const b1=corner(0,0,b.y),   b2=corner(1,0,b.y),   b3=corner(1,1,b.y),   b4=corner(0,1,b.y);
  const poly = (pts,fill)=>{ ctx.fillStyle=fill; ctx.strokeStyle=fill; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(...pts[0]); for(let i=1;i<pts.length;i++) ctx.lineTo(...pts[i]);
    ctx.closePath(); ctx.fill(); ctx.stroke(); };
  const faces = [
    { pts:[t2,t3,b3,b2], n:[ 1, 0] },
    { pts:[t3,t4,b4,b3], n:[ 0, 1] },
    { pts:[t1,t2,b2,b1], n:[ 0,-1] },
    { pts:[t4,t1,b1,b4], n:[-1, 0] },
  ];
  const cs = Math.cos(yaw), sn = Math.sin(yaw);
  for(const f of faces){
    const rxn = f.n[0]*cs - f.n[1]*sn, rzn = f.n[0]*sn + f.n[1]*cs;
    if(rxn + rzn <= 0.02) continue;
    poly(f.pts, (rxn - rzn) > 0 ? m.right : m.left);
    if(b.m==='garden'){ // vines spilling over the edge
      const [pA,pB] = f.pts;
      ctx.strokeStyle='rgba(107,158,100,.85)'; ctx.lineWidth=1.4; ctx.lineCap='round';
      ctx.fillStyle='rgba(107,158,100,.85)';
      for(const fu of [.22,.52,.8]){
        const x0=lerp(pA[0],pB[0],fu), y0=lerp(pA[1],pB[1],fu);
        const len = 7+fu*8, sw = Math.sin(performance.now()/900 + fu*7 + b.x)*1.5;
        ctx.beginPath(); ctx.moveTo(x0,y0);
        ctx.quadraticCurveTo(x0+sw, y0+len*.6, x0+sw*.6, y0+len); ctx.stroke();
        ctx.beginPath(); ctx.arc(x0+sw*.6, y0+len, 1.4, 0, TAU); ctx.fill();
      }
    }
    if(b.m==='office'){ // lit windows — someone is always working late
      const [pA,pB,pC,pD] = f.pts; // top-left going around
      ctx.fillStyle = 'rgba(255,225,170,.85)';
      for(const [fu,fv] of [[.28,.3],[.62,.3],[.28,.62],[.62,.62]]){
        const topx = lerp(pA[0],pB[0],fu), topy = lerp(pA[1],pB[1],fu);
        const botx = lerp(pD[0],pC[0],fu), boty = lerp(pD[1],pC[1],fu);
        const wx0 = lerp(topx,botx,fv), wy0 = lerp(topy,boty,fv);
        const wx1 = lerp(topx,botx,fv+.16), wy1 = lerp(topy,boty,fv+.16);
        const ex = (pB[0]-pA[0])*0.1, ey = (pB[1]-pA[1])*0.1;
        ctx.beginPath();
        ctx.moveTo(wx0,wy0); ctx.lineTo(wx0+ex,wy0+ey); ctx.lineTo(wx1+ex,wy1+ey); ctx.lineTo(wx1,wy1);
        ctx.closePath(); ctx.fill();
      }
    }
  }
  poly([t1,t2,t3,t4], m.top);
  const mx=(t1[0]+t3[0])/2, my=(t1[1]+t3[1])/2;
  if(b.m==='pool'){
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.6;
    const ph=(performance.now()/900 + b.x + b.z)%1;
    ctx.globalAlpha = .3+.4*Math.sin(ph*Math.PI);
    ctx.beginPath(); ctx.moveTo(mx-10, my+(ph-.5)*8); ctx.quadraticCurveTo(mx, my+2+(ph-.5)*8, mx+10, my+(ph-.5)*8); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  if(b.m==='garden' && keyOf(b)!==DECO.cat){
    ctx.fillStyle='#FF8FAF';
    for(const [fx,fy] of [[-6,-2],[4,-4],[0,3]]){
      ctx.beginPath(); ctx.arc(mx+fx, my+fy, 2.4, 0, TAU); ctx.fill();
    }
  }
  if(keyOf(b)===DECO.cat){ // the resident cat, unbothered by the heat advisory
    const nowMs = performance.now(), tw = Math.sin(nowMs/700)*3;
    ctx.fillStyle='#C9B8D8';
    ctx.beginPath(); ctx.ellipse(mx-1, my-3, 7, 4.2, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+6, my-6, 3.6, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(mx+3.6,my-8.6); ctx.lineTo(mx+4.8,my-11.6); ctx.lineTo(mx+6.2,my-8.9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(mx+6.2,my-9.2); ctx.lineTo(mx+7.8,my-11.8); ctx.lineTo(mx+8.6,my-8.7); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#C9B8D8'; ctx.lineWidth=2.2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(mx-7,my-2);
    ctx.quadraticCurveTo(mx-12, my-6+tw, mx-10+tw*.4, my-10+tw); ctx.stroke();
    const zp = (nowMs/2600)%1;
    if(zp<0.55){
      ctx.globalAlpha = 1 - zp/0.55;
      ctx.fillStyle='#5A3A4A'; ctx.font='800 9px ui-rounded, system-ui, sans-serif';
      ctx.fillText('z', mx+10, my-14-zp*12);
      ctx.globalAlpha = 1;
    }
  }
  if(keyOf(b)===DECO.ac){ // rooftop AC — Facilities keeps the cold air indoors, obviously
    const spin = performance.now()/140;
    ctx.fillStyle='rgba(60,30,50,.16)';
    ctx.beginPath(); ctx.ellipse(mx, my+1.5, 10, 3.4, 0, 0, TAU); ctx.fill();
    ctx.fillStyle='#DDD3EA';
    ctx.beginPath(); ctx.roundRect(mx-8, my-11, 16, 11, 2); ctx.fill();
    ctx.strokeStyle='#9C90B4'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(mx-8, my-11, 16, 11, 2); ctx.stroke();
    ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(mx-2.5, my-5.5, 3.6, 0, TAU); ctx.stroke();
    ctx.lineWidth=1.2;
    for(let i=0;i<3;i++){
      const a = spin + i*(TAU/3);
      ctx.beginPath(); ctx.moveTo(mx-2.5, my-5.5);
      ctx.lineTo(mx-2.5+Math.cos(a)*2.8, my-5.5+Math.sin(a)*2.8); ctx.stroke();
    }
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(mx+3.4, my-9.4+i*3); ctx.lineTo(mx+6.2, my-9.4+i*3); ctx.stroke(); }
  }
  if(b.m==='crank'){ // bolt + rotation affordance
    ctx.fillStyle='#8A6230';
    ctx.beginPath(); ctx.ellipse(mx, my, 5.5, 3.4, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle='rgba(138,98,48,.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(mx, my, 11, 6.8, 0, .6, TAU-.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx+9, my-4.4); ctx.lineTo(mx+13, my-6); ctx.lineTo(mx+12, my-1.4); ctx.closePath();
    ctx.fillStyle='rgba(138,98,48,.8)'; ctx.fill();
  }
  if(b.m==='valve'){ // wheel
    ctx.strokeStyle='#3E627C'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.ellipse(mx, my, 8, 5, 0, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx-8,my); ctx.lineTo(mx+8,my); ctx.moveTo(mx,my-5); ctx.lineTo(mx,my+5); ctx.stroke();
    const pulse = 0.3+Math.sin(performance.now()/300)*0.2;
    ctx.strokeStyle=`rgba(255,255,255,${pulse})`;
    ctx.beginPath(); ctx.ellipse(mx, my, 12, 7.5, 0, 0, TAU); ctx.stroke();
  }
  if(b.m==='office' && b.y===1 && DOOR && b.z===DOOR.z && Math.abs(b.x-DOOR.x)===1
     && Math.cos(yaw)+Math.sin(yaw) > 0.02){
    // company sign above the awning — branding survives everything
    const dm = [(t2[0]+b3[0]+t3[0]+b2[0])/4, (t2[1]+b3[1]+t3[1]+b2[1])/4];
    ctx.fillStyle='#FFF6E8';
    ctx.beginPath(); ctx.roundRect(dm[0]-17, dm[1]-6, 34, 11, 3); ctx.fill();
    ctx.fillStyle='#A85546'; ctx.font='800 6.5px ui-rounded, system-ui, sans-serif';
    ctx.textAlign='center';
    ctx.fillText('HOT DESK', dm[0], dm[1]+2.4);
    ctx.textAlign='left';
  }
  if(b.m==='office' && b.y===0 && DOOR && b.z===DOOR.z && Math.abs(b.x-DOOR.x)===1){
    const dm = [(t2[0]+b3[0]+t3[0]+b2[0])/4, (t2[1]+b3[1]+t3[1]+b2[1])/4];
    ctx.fillStyle='#7E4638';
    ctx.beginPath(); ctx.ellipse(dm[0], dm[1]+3, 6.5, 9, 0, 0, TAU); ctx.fill();
    // striped awning — HOT DESK INC. cares about kerb appeal
    for(let i=0;i<4;i++){
      ctx.fillStyle = i%2 ? '#FF8B7E' : '#FFF6E8';
      ctx.beginPath();
      ctx.moveTo(dm[0]-11+i*5.5, dm[1]-8); ctx.lineTo(dm[0]-5.5+i*5.5, dm[1]-8);
      ctx.lineTo(dm[0]-4+i*5.5, dm[1]-4.5); ctx.lineTo(dm[0]-9.5+i*5.5, dm[1]-4.5);
      ctx.closePath(); ctx.fill();
    }
  }
  if(b.m==='pool' && POOLS.length && keyOf(b)===keyOf(POOLS[0])){
    // chrome ladder — for people who arrive some way other than cannonball
    ctx.strokeStyle='#F2F2F7'; ctx.lineWidth=1.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(mx-11, my-7); ctx.lineTo(mx-11, my+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx-6, my-8.5); ctx.lineTo(mx-6, my+1.5); ctx.stroke();
    ctx.lineWidth=1.3;
    for(const dy of [-4.5, -0.5]){
      ctx.beginPath(); ctx.moveTo(mx-11, my+dy); ctx.lineTo(mx-6, my-1.5+dy); ctx.stroke();
    }
  }
  if(b.m==='pool' && POOLS.length>=3 && keyOf(b)===keyOf(POOLS[1])){
    // beach ball adrift
    const bx = mx + Math.sin(performance.now()/1100+1)*3.5, by = my + Math.cos(performance.now()/1500)*1.6;
    const cols = ['#FF8B7E','#FFF6E8','#8FB8DE','#FFD66B'];
    for(let i=0;i<4;i++){
      ctx.fillStyle = cols[i];
      ctx.beginPath(); ctx.moveTo(bx,by);
      ctx.arc(bx, by, 4.6, i*Math.PI/2 + 0.6, (i+1)*Math.PI/2 + 0.6); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.beginPath(); ctx.arc(bx-1.4, by-1.6, 1.2, 0, TAU); ctx.fill();
  }
  if(b.m==='pool' && POOLS.length && keyOf(b)===keyOf(POOLS[POOLS.length-1]) && b.y===POOLS[0].y){
    // a pink donut floatie drifting in the far pool tile
    const fx = mx + Math.sin(performance.now()/1400)*4, fy = my + Math.cos(performance.now()/1700)*2;
    ctx.fillStyle='#FF8FAF';
    ctx.beginPath(); ctx.ellipse(fx, fy, 8, 5, 0, 0, TAU); ctx.fill();
    ctx.fillStyle=MATS.pool.top;
    ctx.beginPath(); ctx.ellipse(fx, fy, 3.6, 2.2, 0, 0, TAU); ctx.fill();
  }
  if(b.m==='walk' && POOLS.length){
    // towel on the tile beside the pool — someone claimed the spot at 6am
    const p0 = POOLS[0];
    if(Math.abs(b.x-p0.x)+Math.abs(b.z-p0.z)===1 && b.y===p0.y){
      ctx.fillStyle='#FFD66B';
      ctx.save(); ctx.translate(mx+6, my+4); ctx.rotate(-0.5);
      ctx.fillRect(-7,-4,14,8);
      ctx.fillStyle='#FF8B7E'; ctx.fillRect(-7,-4,14,2.4);
      ctx.restore();
      // flip-flops, kicked off in a hurry
      ctx.fillStyle='#FF8B7E';
      ctx.beginPath(); ctx.ellipse(mx-6, my+7, 1.9, 3, 0.4, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.ellipse(mx-1.5, my+8.5, 1.9, 3, 0.15, 0, TAU); ctx.fill();
      ctx.fillStyle='rgba(255,246,232,.9)';
      ctx.beginPath(); ctx.arc(mx-6, my+6, .7, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(mx-1.5, my+7.5, .7, 0, TAU); ctx.fill();
    }
  }
}

function drawFalls(bobY, t){
  const cx = CW/2, cy = CH*0.46 + bobY;
  for(const f of FALLS){
    const top = project(f.top.x+0.5, f.top.y, f.top.z+0.5);
    if(!f.diverted){
      const bot = project(f.tile.x+0.5, f.tile.y+1, f.tile.z+0.5);
      const grad = ctx.createLinearGradient(0, cy+top.sy, 0, cy+bot.sy);
      grad.addColorStop(0,'rgba(160,220,245,.75)'); grad.addColorStop(1,'rgba(160,220,245,.25)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(cx+top.sx-7, cy+top.sy, 14, bot.sy-top.sy, 6); ctx.fill();
      // streaks
      ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.6;
      for(let i=0;i<3;i++){
        const ph = (t*1.8 + i/3)%1;
        const yy = cy + lerp(top.sy, bot.sy, ph);
        ctx.beginPath(); ctx.moveTo(cx+top.sx-4+i*4, yy); ctx.lineTo(cx+top.sx-4+i*4, yy+8); ctx.stroke();
      }
      // splash
      if(Math.random()<0.3)
        particles.push({sx:top.sx+rand(-8,8), sy:bot.sy-2, vx:rand(-30,30), vy:rand(-60,-20), life:.4, max:.4, color:'#BFE9F7', size:rand(1.5,2.6)});
      // a shy rainbow in the spray
      ctx.lineWidth=2.4;
      const rcs = ['rgba(255,139,126,.3)','rgba(255,214,107,.3)','rgba(155,199,222,.3)'];
      for(let i=0;i<3;i++){
        ctx.strokeStyle = rcs[i];
        ctx.beginPath(); ctx.arc(cx+top.sx, cy+bot.sy-2, 15+i*3.2, Math.PI, TAU); ctx.stroke();
      }
    } else {
      // diverted: dribbles off the side of the fountain cube, missing the path
      ctx.strokeStyle='rgba(160,220,245,.6)'; ctx.lineWidth=3;
      const ph=(t*2)%1;
      ctx.beginPath();
      ctx.moveTo(cx+top.sx+10, cy+top.sy);
      ctx.quadraticCurveTo(cx+top.sx+26, cy+top.sy+14, cx+top.sx+30, cy+top.sy+34+ph*6);
      ctx.stroke();
    }
  }
}

function drawWalker(w, bobY){
  const p = walkerScreen(w);
  const dive = w.diving != null ? clamp(w.diving,0,1) : 0;
  const cx = CW/2 + p.sx, cy = CH*0.46 + p.sy + bobY - Math.sin(dive*Math.PI)*24 + dive*dive*10;
  const heat = w.heat/100, bob = Math.sin(w.phase)*1.4;
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle='rgba(90,50,70,.3)';
  ctx.beginPath(); ctx.ellipse(0, 2, 8, 3, 0, 0, TAU); ctx.fill();
  const lp=Math.sin(w.phase);
  ctx.strokeStyle='#5A5F73'; ctx.lineWidth=3.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,-10+bob*.3); ctx.lineTo(-2+lp*3.4, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-10+bob*.3); ctx.lineTo(2-lp*3.4, 0); ctx.stroke();
  const mixC=(h1,t)=>{
    const p1=parseInt(h1.slice(1),16), r=(p1>>16)&255,g=(p1>>8)&255,bl=p1&255;
    return `rgb(${Math.round(lerp(r,255,t*.6))},${Math.round(lerp(g,90,t*.6))},${Math.round(lerp(bl,70,t*.6))})`;
  };
  ctx.fillStyle=mixC(w.shirt, heat);
  ctx.beginPath(); ctx.roundRect(-6,-22+bob,12,14,4); ctx.fill();
  ctx.fillStyle=`hsl(${w.tieHue} 60% 52%)`;
  ctx.beginPath(); ctx.moveTo(0,-21+bob); ctx.lineTo(1.8,-17+bob); ctx.lineTo(0,-11+bob); ctx.lineTo(-1.8,-17+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle=w.skin;
  ctx.beginPath(); ctx.arc(0,-27+bob,5.4,0,TAU); ctx.fill();
  ctx.fillStyle='#3B2B27';
  ctx.beginPath(); ctx.arc(0,-29+bob,4.6,Math.PI*1.05,Math.PI*1.95); ctx.fill();
  if(w.waiting){
    ctx.fillStyle='rgba(255,246,232,.92)';
    ctx.beginPath(); ctx.roundRect(-10,-44+bob,20,11,5.5); ctx.fill();
    ctx.fillStyle='#5A3A4A';
    const on = Math.floor(performance.now()/400)%3;
    for(let i=0;i<3;i++){
      ctx.globalAlpha = on>=i ? 1 : .25;
      ctx.beginPath(); ctx.arc(-4.5+i*4.5, -38.5+bob, 1.5, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if(w.heat>15){
    ctx.fillStyle='rgba(58,32,48,.4)'; ctx.fillRect(-9,-52+bob,18,4);
    ctx.fillStyle = heat<0.5?'#FFD66B':heat<0.8?'#FF9A5C':'#F0503C';
    ctx.fillRect(-9,-52+bob,18*heat,4);
  }
  ctx.restore();
}

function drawParasol(pp, bobY, t){
  const q = project(pp.t.x, pp.t.y+1, pp.t.z);
  const px = CW/2 + q.sx, py = CH*0.46 + q.sy + bobY;
  ctx.fillStyle = 'rgba(96,70,140,.16)';
  ctx.beginPath(); ctx.ellipse(px, py, TILE*0.95, TILE*0.55, 0, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#8A5A45'; ctx.lineWidth = 2.6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py-26); ctx.stroke();
  const R = 17, wob = Math.sin(t*2 + pp.t.x)*1.2;
  ctx.fillStyle = '#FF8B7E';
  ctx.beginPath(); ctx.arc(px, py-26+wob*.3, R, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFD3B8';
  ctx.beginPath(); ctx.moveTo(px, py-26+wob*.3);
  ctx.arc(px, py-26+wob*.3, R, Math.PI+Math.PI/4, Math.PI+Math.PI/2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF8B7E';
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(px-R+(i+0.5)*(R/2), py-26+wob*.3, R/4.4, 0, Math.PI); ctx.fill(); }
}

let last=performance.now();
function frame(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  update(dt);
  const t=now/1000;

  ctx.setTransform(dpr,0,0,dpr,0,0);
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#FFD9B8'); g.addColorStop(.45,'#F0A8A8'); g.addColorStop(1,'#C9A7E8');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='rgba(255,255,255,.35)';
  for(let i=0;i<14;i++){
    const mx=((i*167)%(CW+40))-20 + Math.sin(t*.3+i)*10;
    const my=((i*247 + t*9)%(CH+40))-20;
    ctx.beginPath(); ctx.arc(mx,my, 1.4+(i%3)*.7, 0, TAU); ctx.fill();
  }
  // ☀️ the antagonist, upper right, radiating smugness
  const sunX = CW-56, sunY = 148;
  const sg = ctx.createRadialGradient(sunX,sunY,4,sunX,sunY,54);
  sg.addColorStop(0,'rgba(255,236,190,.95)');
  sg.addColorStop(.35,'rgba(255,214,140,.5)');
  sg.addColorStop(1,'rgba(255,214,140,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sunX,sunY,54,0,TAU); ctx.fill();
  ctx.fillStyle='#FFE3A8'; ctx.beginPath(); ctx.arc(sunX,sunY,16,0,TAU); ctx.fill();
  ctx.strokeStyle='rgba(255,227,168,.75)'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const a = t*0.15 + i*(TAU/8), r1 = 21, r2 = 26 + Math.sin(t*3+i)*2;
    ctx.beginPath();
    ctx.moveTo(sunX+Math.cos(a)*r1, sunY+Math.sin(a)*r1);
    ctx.lineTo(sunX+Math.cos(a)*r2, sunY+Math.sin(a)*r2); ctx.stroke();
  }

  // clouds drift behind the island at three depths
  for(const c of CLOUDS){
    const cxp = ((c.x + t*c.v) % (CW+220)) - 110, cyp = CH*c.y;
    ctx.fillStyle = `rgba(255,255,255,${c.a})`;
    ctx.beginPath();
    ctx.arc(cxp, cyp, 16*c.s, 0, TAU);
    ctx.arc(cxp+15*c.s, cyp-6*c.s, 12*c.s, 0, TAU);
    ctx.arc(cxp+30*c.s, cyp, 13*c.s, 0, TAU);
    ctx.fill();
  }

  // a couple of commuting birds
  ctx.strokeStyle='rgba(90,58,74,.5)'; ctx.lineWidth=1.6; ctx.lineCap='round';
  for(let i=0;i<2;i++){
    const a = t*0.14 + i*2.6;
    const bx = CW/2 + Math.cos(a)*CW*0.38, by = CH*0.19 + Math.sin(a)*24 + i*24;
    const fl = Math.sin(t*7 + i*2)*2.6;
    ctx.beginPath(); ctx.moveTo(bx-4,by); ctx.quadraticCurveTo(bx-2, by-2-fl, bx, by);
    ctx.quadraticCurveTo(bx+2, by-2-fl, bx+4, by); ctx.stroke();
  }

  const bobY = Math.sin(t*0.8)*5;

  // the island's shadow: its actual footprint, cast on the haze below
  ctx.fillStyle='rgba(90,50,110,.15)';
  ctx.beginPath();
  const shBase = CH*0.46 + 175 + tiltT*46 + bobY*0.2;
  const shCols = new Set();
  for(const b of B){
    const ck = b.x+','+b.z;
    if(shCols.has(ck)) continue;
    shCols.add(ck);
    let first = true;
    for(const [X,Z] of [[b.x,b.z],[b.x+1,b.z],[b.x+1,b.z+1],[b.x,b.z+1]]){
      const p = project(X, 0, Z);
      if(first){ ctx.moveTo(CW/2+p.sx, shBase+p.sy*0.55); first=false; }
      else ctx.lineTo(CW/2+p.sx, shBase+p.sy*0.55);
    }
    ctx.closePath();
  }
  ctx.fill();

  // paint blocks back-to-front, and slot each person/parasol in right after
  // the block they occupy — so towers, bridges and cranks can hide them
  const bDepth = new Map(B.map(b=>[keyOf(b), project(b.x,b.y,b.z).depth]));
  const sorted=[...B].sort((a,b2)=>
    (bDepth.get(keyOf(a)) - bDepth.get(keyOf(b2))) || (a.y - b2.y));
  const wsAt = new Map(), ppAt = new Map();
  for(const w of walkers){
    const dT = bDepth.get(keyOf(w.tile)) ?? -1e9;
    const dN = w.next ? (bDepth.get(keyOf(w.next)) ?? -1e9) : -1e9;
    const k = keyOf(dN > dT ? w.next : w.tile);
    if(!wsAt.has(k)) wsAt.set(k, []);
    wsAt.get(k).push(w);
  }
  for(const pp of parasols){
    const k = keyOf(pp.t);
    if(!ppAt.has(k)) ppAt.set(k, []);
    ppAt.get(k).push(pp);
  }
  for(const b of sorted){
    drawBlock(b, bobY);
    const k = keyOf(b);
    if(ppAt.has(k)){ for(const pp of ppAt.get(k)) drawParasol(pp, bobY, t); ppAt.delete(k); }
    if(wsAt.has(k)){
      const ws = wsAt.get(k).sort((a,b2)=>walkerScreen(a).depth - walkerScreen(b2).depth);
      for(const w of ws) drawWalker(w, bobY);
      wsAt.delete(k);
    }
  }
  drawFalls(bobY, t);
  for(const ws of wsAt.values()) for(const w of ws) drawWalker(w, bobY);
  for(const pps of ppAt.values()) for(const pp of pps) drawParasol(pp, bobY, t);

  for(const p of particles){
    ctx.globalAlpha=clamp(p.life/p.max,0,1);
    if(p.type==='ripple'){
      const grow = p.size + (1 - p.life/p.max) * 30;
      ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(CW/2+p.sx, CH*0.46+p.sy, grow, grow*0.45, 0, 0, TAU); ctx.stroke();
    } else {
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(CW/2+p.sx, CH*0.46+p.sy, p.size, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
loadWorld(parseInt(localStorage.getItem('btw_world')||'0') || 0);

/* debug handle for tests */
window.__tw = {
  state: ()=>({ mode, wi, snap: snapIndex(yawTarget), tilt: tiltTarget, saved: savedCount, melted: meltedCount,
                parasols: parasols.length, waiting: walkers.filter(w=>w.waiting).length,
                tiles: walkers.map(w=>keyOf(w.tile)),
                falls: FALLS.map(f=>f.diverted) }),
  pathAt: (yv, tv)=>{ const keep=G; G=graphAt(yv, tv); const p=routeFrom(DOOR); G=keep; return p && p.length; },
  setView: (yv, tv)=>{ yaw = yawTarget = SNAPS[yv]; tiltT = tiltTarget = tv;
                       if(mode==='spin') refreshGate(); else G = graphAt(yv, tv); },
  load: i=>loadWorld(i),
  open: ()=>openDoors(),
  crank: tag=>{ const c = CRANKS.find(k=>k.tag===tag); if(!c) return false;
    const tiles = B.filter(b=>b.grp===tag);
    const p = project(tiles[0].x+0.5, tiles[0].y+1, tiles[0].z+0.5);
    return tapCrank(p.sx, p.sy); },
  valve: i=>{ const f = FALLS[i]; if(!f) return false;
    const p = project(f.valve.x+0.5, f.valve.y+1, f.valve.z+0.5);
    return tapValve(p.sx, p.sy); },
  tileXY: (x,y,z)=>{ const q=project(x,y+1,z); return { x: CW/2+q.sx, y: CH*0.46+q.sy }; },
};
</script>
